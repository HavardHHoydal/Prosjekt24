<style>
:root{
  --bg:#0A1114; --card:#101B20; --card2:#0D171B;
  --line:rgba(140,175,184,.14); --line2:rgba(140,175,184,.24);
  --text:#EAF3F4; --mist:#7F98A0;
  --ember:#FF6B35; --ember2:#FFA94D; --ember-soft:rgba(255,107,53,.14);
  --moss:#34D399; --moss-soft:rgba(52,211,153,.14);
  --warn:#F87171; --teal:#2DD4BF;
  --glow:0 10px 30px rgba(255,107,53,.35);
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.35);
  --seg-bg:rgba(140,175,184,.10);
  --input-bg:rgba(140,175,184,.07);
}
[data-theme="light"]{
  --bg:#F2F5F4; --card:#FFFFFF; --card2:#FFFFFF;
  --line:#DFE8E9; --line2:#C9D8DB;
  --text:#0E2A33; --mist:#5F7B84;
  --ember:#E8622C; --ember2:#FF8A4D; --ember-soft:#FBE3D7;
  --moss:#2E7D5B; --moss-soft:#DDEEE6;
  --warn:#B3541E; --teal:#0F8B80;
  --glow:0 8px 22px rgba(232,98,44,.30);
  --shadow:0 1px 2px rgba(14,42,51,.06), 0 4px 14px rgba(14,42,51,.05);
  --seg-bg:#E4EBEA;
  --input-bg:#FAFCFB;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:var(--text); -webkit-tap-highlight-color:transparent; overscroll-behavior-y:none;
}
input,select,button,textarea{font-family:inherit;}
button{color:inherit;}
.num{font-family:ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-variant-numeric:tabular-nums;}
.wrap{max-width:480px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 16px 118px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.brand{font-weight:900;font-size:15px;letter-spacing:.03em;}
.brand span{background:linear-gradient(135deg,var(--ember2),var(--ember));-webkit-background-clip:text;background-clip:text;color:transparent;}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--mist);display:flex;border-radius:10px;}
.icon-btn:active{transform:scale(.92);}
.card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px;}
.card.clickable{cursor:pointer;}
.card.clickable:active{transform:scale(.985);}
.card.tight{padding:14px;}
.card.hero{background:radial-gradient(130% 100% at 88% -10%, rgba(255,107,53,.22), transparent 55%), var(--card2);border-color:var(--line2);}
[data-theme="light"] .card.hero{background:radial-gradient(130% 100% at 88% -10%, rgba(232,98,44,.14), transparent 55%), #0F3D4C;color:#fff;border:none;}
.card.softwarn{background:var(--ember-soft);border-color:transparent;}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--mist);}
.eyebrow.em{color:var(--ember);}
.eyebrow.light{color:rgba(255,255,255,.55);}
.eyebrow.warn{color:var(--warn);}
h1,h2,h3,p{margin:0;}
.btn{border:none;border-radius:14px;font-weight:800;cursor:pointer;padding:14px 16px;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;transition:transform .06s ease;}
.btn:active{transform:scale(.97);}
.btn.small{padding:9px 13px;font-size:13px;width:auto;border-radius:11px;}
.btn.primary{background:linear-gradient(135deg,var(--ember2),var(--ember));color:#14100D;box-shadow:var(--glow);}
[data-theme="light"] .btn.primary{color:#fff;}
.btn.dark{background:var(--seg-bg);color:var(--text);border:1px solid var(--line);}
.btn.ghost{background:transparent;color:var(--text);border:1.5px solid var(--line2);}
.btn.soft{background:var(--ember-soft);color:var(--ember);}
.btn:disabled{opacity:.45;box-shadow:none;}
.btn-row{display:flex;gap:8px;}
.input{width:100%;box-sizing:border-box;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:var(--input-bg);font-size:15px;color:var(--text);font-variant-numeric:tabular-nums;outline:none;}
.input:focus{border-color:var(--ember);}
.input::placeholder{color:var(--mist);opacity:.7;}
select.input{-webkit-appearance:none;appearance:none;}
.seg{display:flex;background:var(--seg-bg);border-radius:13px;padding:4px;}
.seg button{flex:1;padding:9px 6px;border-radius:10px;border:none;font-weight:800;font-size:12.5px;cursor:pointer;background:transparent;color:var(--mist);transition:color .15s;}
.seg button.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.28);}
[data-theme="light"] .seg button.active{box-shadow:0 1px 4px rgba(14,42,51,.14);}
.row{display:flex;align-items:center;gap:10px;}
.between{display:flex;justify-content:space-between;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.mist{color:var(--mist);}
.small{font-size:12px;}
.tabnum{font-variant-numeric:tabular-nums;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 14px calc(12px + env(safe-area-inset-bottom));pointer-events:none;}
.bottomnav-inner{max-width:440px;margin:0 auto;display:flex;padding:8px;border-radius:24px;pointer-events:auto;
  background:rgba(13,23,27,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--line2);box-shadow:0 12px 36px rgba(0,0,0,.45);}

function dstr(d){ d = d || new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseDstr(s){ const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }
function todayStr(){ return dstr(); }
function beregnUke(startDate){
  if(!startDate) return 1;
  const diff = Math.floor((parseDstr(dstr()) - parseDstr(startDate)) / 86400000);
  return Math.min(24, Math.max(1, Math.floor(diff/7)+1));
}
function faseIdx(uke){ return uke<=8 ? 0 : uke<=16 ? 1 : 2; }
function paceFmt(sec){ if(!isFinite(sec)||sec<=0) return "–"; const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+String(s).padStart(2,"0"); }
function tidFmt(sec){ const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+String(s).padStart(2,"0"); }
function kortDato(iso){ return iso.slice(8,10)+"."+iso.slice(5,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function tall(v){ return Number(String(v==null?"":v).replace(",", "."))||0; }
function e1rm(w,r){ return (Number(w)||0) * (1 + (Number(r)||0)/30); }
function pauseTekst(ps){ return ps>=120 ? Math.round(ps/60)+" min" : ps+" s"; }

function radForOvelse(ov, fIdx, sisteSets){
  if(!sisteSets || !sisteSets.length) return null;
  const mx = ov.reps[fIdx][1];
  const alle = sisteSets.every(s => (Number(s.r)||0) >= mx);
  if(!alle) return null;
  if(ov.tid) return "Maks tid på alle sett – legg på vektskive eller +10 s";
  if(ov.inc === 0) return "Topp reps på alle sett – øk reps eller heng på vekt";
  return "Klart sist – øk +" + ov.inc + " kg i dag";
}
function sisteForOvelse(logg, navn){
  for(let i=logg.length-1;i>=0;i--){
    const f = (logg[i].ovelser||[]).find(o=>o.n===navn);
    if(f && f.sets && f.sets.length) return { date: logg[i].date, sets: f.sets };
  }
  return null;
}

let TIMER = { endAt:0, total:0, label:"", iv:null, audio:null };
function timerBeep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    if(!TIMER.audio) TIMER.audio = new AC();
    const ctx = TIMER.audio;
    if(ctx.state==="suspended") ctx.resume();
    for(let i=0;i<3;i++){
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type="sine"; o.frequency.value=880;
      g.gain.setValueAtTime(0.0001, ctx.currentTime + i*0.35);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + i*0.35 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i*0.35 + 0.28);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i*0.35); o.stop(ctx.currentTime + i*0.35 + 0.3);
    }
  }catch(e){}
}
function startTimer(sec, label){
  TIMER.endAt = Date.now() + sec*1000;
  TIMER.total = sec;
  TIMER.label = label || "Pause";
  if(TIMER.iv) clearInterval(TIMER.iv);
  TIMER.iv = setInterval(timerTick, 250);
  timerTick();
}
function stoppTimer(){
  if(TIMER.iv) clearInterval(TIMER.iv);
  TIMER.iv = null; TIMER.endAt = 0;
  const el = document.getElementById("timerPill");
  if(el) el.remove();
}
function timerPlus(sek){ if(TIMER.endAt){ TIMER.endAt += sek*1000; timerTick(); } }
function timerTick(){
  let el = document.getElementById("timerPill");
  if(!TIMER.endAt){ if(el) el.remove(); return; }
  const rest = Math.ceil((TIMER.endAt - Date.now())/1000);
  if(!el){
    el = document.createElement("div");
    el.id = "timerPill"; el.className = "timerpill";
    el.innerHTML = '<div style="min-width:0;"><div class="eyebrow" id="timerLbl"></div>'
      + '<div class="t-num num" id="timerNum"></div></div>'
      + '<button class="btn dark small" data-act="timer-plus">+15 s</button>'
      + '<button class="icon-btn" data-act="timer-stop">'+ic("x",18)+'</button>';
    document.body.appendChild(el);
  }
  const lblEl = document.getElementById("timerLbl"), numEl = document.getElementById("timerNum");
  if(lblEl) lblEl.textContent = TIMER.label;
  if(rest <= 0){
    if(numEl){ numEl.textContent = "Kjør!"; numEl.style.color = "var(--ember)"; }
    el.classList.add("ferdig");
    timerBeep();
    clearInterval(TIMER.iv); TIMER.iv = null; TIMER.endAt = 0;
    setTimeout(()=>{ const p=document.getElementById("timerPill"); if(p) p.remove(); }, 3500);
  } else {
    if(numEl){ numEl.textContent = tidFmt(rest); numEl.style.color = ""; }
  }
}

const MATPROMPT =
  'Du er en presis ernæringsekspert med god kjennskap til norsk mat og norske porsjonsstørrelser. ' +
  'Fremgangsmåte: 1) Identifiser hver matkomponent. 2) Anslå mengden i gram for hver (bruk tallerken, bestikk eller emballasje som størrelsesreferanse hvis bilde). ' +
  '3) Beregn næringsinnhold per komponent. Vær kalibrert – ikke overdriv eller underdriv porsjonene. ' +
  'Svar KUN med gyldig JSON, ingen annen tekst, ingen markdown. Format: ' +
  '{"items":[{"navn":"komponent (~X g)","kcal":0,"protein":0,"karbo":0,"fett":0}]} Alle tall som heltall.';

function aiModellId(){ return S.aiModell==="sonnet" ? "claude-sonnet-4-6" : "claude-haiku-4-5-20251001"; }

async function aiAnalyserMat(tekst, bilde){
  if(!S.apiKey) throw new Error("NOKKEL_MANGLER");
  const content = [];
  if(bilde) content.push({ type:"image", source:{ type:"base64", media_type: bilde.mediaType, data: bilde.data } });
  content.push({ type:"text", text: MATPROMPT + (bilde
      ? " Analyser maten på bildet." + (tekst ? " Tilleggsinfo fra brukeren: " + tekst : "")
      : " Måltid: " + tekst) });
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "content-type":"application/json", "x-api-key":S.apiKey,
      "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model: aiModellId(), max_tokens: 1200, messages:[{role:"user", content}] }),
  });
  if(!res.ok){
    if(res.status===401) throw new Error("NOKKEL_UGYLDIG");
    let d=""; try{ const j=await res.json(); d=(j.error&&j.error.message)||""; }catch(e){}
    throw new Error("API_FEIL: " + (d||res.status));
  }
  const data = await res.json();
  const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = txt.replace(/```json|```/g,"").trim();
  const a = clean.indexOf("{"), b = clean.lastIndexOf("}");
  const parsed = JSON.parse(clean.slice(a,b+1));
  if(!parsed.items || !Array.isArray(parsed.items)) throw new Error("UVENTET_SVAR");
  return parsed.items.map(it => ({
    navn:String(it.navn||"Mat"),
    kcal:Math.max(0,Math.round(Number(it.kcal)||0)),
    p:Math.max(0,Math.round(Number(it.protein)||0)),
    k:Math.max(0,Math.round(Number(it.karbo)||0)),
    f:Math.max(0,Math.round(Number(it.fett)||0)),
  }));
}

/* ================= PRODUKTSØK (Open Food Facts – gratis, norsk-prioritert) ================= */
async function offSok(q){
  const felter = "product_name,brands,nutriments,code";
  const baser = ["https://no.openfoodfacts.org","https://world.openfoodfacts.org"];
  for(const base of baser){
    try{
      const url = base + "/cgi/search.pl?search_terms=" + encodeURIComponent(q)
        + "&search_simple=1&action=process&json=1&page_size=8&fields=" + felter;
      const res = await fetch(url);
      if(!res.ok) continue;
      const data = await res.json();
      const prods = (data.products||[]).map(p=>{
        const n = p.nutriments || {};
        let kcal = n["energy-kcal_100g"];
        if(kcal==null && n["energy_100g"]!=null) kcal = n["energy_100g"]/4.184;
        return {
          navn:(p.product_name||"").trim(),
          merke:((p.brands||"").split(",")[0]||"").trim(),
          kcal100: kcal!=null ? Math.round(Number(kcal)) : null,
          p100: n.proteins_100g!=null ? Math.round(Number(n.proteins_100g)*10)/10 : 0,
          k100: n.carbohydrates_100g!=null ? Math.round(Number(n.carbohydrates_100g)*10)/10 : 0,
          f100: n.fat_100g!=null ? Math.round(Number(n.fat_100g)*10)/10 : 0,
        };
      }).filter(p=>p.navn && p.kcal100!=null);
      if(prods.length) return prods;
    }catch(e){}
  }
  return [];
}

function svgLine(points, opts){
  opts = opts || {};
  const W=320, H=opts.h||180, PAD=10, PADB=18, PADL=6;
  if(points.length < 2) return null;
  const ys = points.map(p=>p.y);
  let lo = Math.min(...ys), hi = Math.max(...ys);
  if(opts.band){ lo = Math.min(lo, opts.band[0]); hi = Math.max(hi, opts.band[1]); }
  if(opts.ref!=null){ lo = Math.min(lo, opts.ref); hi = Math.max(hi, opts.ref); }
  const padv = (hi-lo)*0.15 || Math.abs(hi)*0.08 || 1;
  lo -= padv; hi += padv;
  const n = points.length;
  const x = i => PADL + (i/(n-1))*(W-PADL-PAD);
  const y = v => opts.reversed
    ? PAD + ((v-lo)/(hi-lo))*(H-PAD-PADB)
    : (H-PADB) - ((v-lo)/(hi-lo))*(H-PAD-PADB);
  let ekstra = "";
  if(opts.band){
    const y1=y(opts.band[1]), y2=y(opts.band[0]);
    ekstra += '<rect x="0" y="'+Math.min(y1,y2)+'" width="'+W+'" height="'+Math.abs(y2-y1)+'" fill="var(--moss)" opacity="0.13" rx="4"/>';
  }
  if(opts.ref!=null){
    ekstra += '<line x1="0" y1="'+y(opts.ref)+'" x2="'+W+'" y2="'+y(opts.ref)+'" stroke="var(--mist)" stroke-dasharray="4 4" opacity="0.6"/>';
  }
  const pts = points.map((p,i)=>x(i)+","+y(p.y)).join(" ");
  const dots = points.map((p,i)=>'<circle cx="'+x(i)+'" cy="'+y(p.y)+'" r="3.2" fill="'+(opts.color||"var(--ember)")+'"/>').join("");
  const fmtY = opts.fmtY || (v=>Math.round(v));
  const labels = points.map((p,i)=> (n<=6 || i===0 || i===n-1 || i===Math.floor(n/2)) ?
    '<text x="'+x(i)+'" y="'+(H-4)+'" font-size="9" fill="var(--mist)" text-anchor="middle">'+esc(p.lbl)+'</text>' : "").join("");
  const siste = '<text x="'+x(n-1)+'" y="'+(y(points[n-1].y)-9)+'" font-size="11" font-weight="800" text-anchor="end" fill="'+(opts.color||"var(--ember)")+'">'+fmtY(points[n-1].y)+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none" style="overflow:visible">'
    + ekstra
    + '<polyline points="'+pts+'" fill="none" stroke="'+(opts.color||"var(--ember)")+'" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + labels + siste + '</svg>';
}
function svgBar(points, opts){
  opts = opts || {};
  const W=320, H=opts.h||180, PADB=18, PADT=10;
  const n = points.length; if(!n) return null;
  const maxV = Math.max(...points.map(p=>p.y), 1) * 1.15;
  const gap = W/n, bw = gap*0.55;
  const bars = points.map((p,i)=>{
    const bh = (p.y/maxV)*(H-PADT-PADB);
    const bx = i*gap + (gap-bw)/2, by = H-PADB-bh;
    return '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="5" fill="'+(opts.color||"url(#gTeal)")+'"/>'
      + '<text x="'+(bx+bw/2)+'" y="'+(H-4)+'" font-size="9" fill="var(--mist)" text-anchor="middle">'+esc(p.lbl)+'</text>';
  }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none">'+bars+'</svg>';
}

function renderHjem(){
  const uke = beregnUke(S.profil.startDate);
  const fI = faseIdx(uke);
  const dagIdx = new Date().getDay();
  const dag = DAGPLAN[dagIdx];
  const ukeInfo = LOPEPLAN[uke-1] || {};
  const matIdag = S.mat[todayStr()] || { type: standardDagtype(todayStr()), items: [] };
  const mal = MATMAL[matIdag.type];
  const tot = summerMat(matIdag);
  const vekt = S.kropp.vekt;
  const sisteVekt = vekt.length ? vekt[vekt.length-1] : null;
  const tester = S.lopelogg.filter(l=>l.type==="test");
  const sisteTest = tester.length ? tester[tester.length-1] : null;
  const nesteMp = MILEPAELER.find(m=>m.uke>=uke) || MILEPAELER[MILEPAELER.length-1];
  const okter = ukensOkter(uke);
  const nesteTestUke = uke<=12 ? 12 : 24;
  const ukerTilTest = nesteTestUke - uke;

  const dagTekst = dag.type==="lop" ? (ukeInfo[dag.slot]||dag.tittel) : dag.tittel;
  const dagIkon = dag.type==="styrke" ? "dumbbell" : dag.type==="lop" ? "run" : "check";
  const dagUnder = dag.type==="lop" ? esc(dagTekst) : dag.type==="styrke" ? "Trykk for å logge økten" : "Gåtur, mobilitet eller lek med barna";

  let html = '<div class="card hero">'
    + '<div class="between" style="margin-bottom:4px;">'
    + '<div class="eyebrow light">'+FASER[fI].navn+' · fase '+(fI+1)+'</div>'
    + (ukeInfo.deload||ukeInfo.test ? '<span style="font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--ember);">'+(ukeInfo.test?"TESTUKE":"DELOAD")+'</span>'
       : (ukerTilTest>0 ? '<span class="small" style="color:rgba(255,255,255,.55);font-weight:700;">'+ukerTilTest+' uker til testløp</span>' : ''))
    + '</div>'
    + '<div class="num" style="font-size:36px;font-weight:900;line-height:1.05;margin-bottom:14px;">Uke '+uke
    + ' <span style="font-weight:600;font-size:19px;color:rgba(255,255,255,.45);">/ 24</span></div>'
    + ukeLinje(uke) + '</div>';

  // Ukens okter
  html += '<div class="card tight"><div class="between" style="margin-bottom:9px;">'
    + '<div class="eyebrow">Ukens økter</div>'
    + '<span class="small num" style="font-weight:900;color:'+(okter.sum>=6?"var(--moss)":"var(--text)")+';">'+okter.sum+' / 6</span></div>'
    + '<div style="display:flex;gap:6px;">'
    + ["A","B","C"].map((k,i)=>'<div style="flex:1;text-align:center;padding:7px 0;border-radius:10px;font-size:11px;font-weight:900;'
        + (okter.s[i] ? 'background:var(--moss-soft);color:var(--moss);' : 'background:var(--seg-bg);color:var(--mist);')+'">'+k+'</div>').join("")
    + ["Tir","Fre","Lør"].map((k,i)=>'<div style="flex:1;text-align:center;padding:7px 0;border-radius:10px;font-size:11px;font-weight:900;'
        + (okter.l[i] ? 'background:var(--moss-soft);color:var(--moss);' : 'background:var(--seg-bg);color:var(--mist);')+'">'+k+'</div>').join("")
    + '</div></div>';

  html += '<div class="card'+(dag.type!=="hvile"?" clickable":"")+'"'+(dag.type!=="hvile"?' data-act="nav" data-val="trening"':'')+'>'
    + '<div class="eyebrow">I dag · '+DAGNAVN[dagIdx]+'</div>'
    + '<div class="oktrow" style="margin-top:9px;">'
    + '<div class="oktdot'+(dag.type==="hvile"?" done":"")+'">'+ic(dagIkon,22)+'</div>'
    + '<div class="oktinfo"><div class="okttitle">'+esc(dag.tittel)+'</div><div class="oktsub">'+dagUnder+'</div></div>'
    + (dag.type!=="hvile" ? ic("chevR",18) : "")
    + '</div></div>';

  html += '<div class="card"><div class="between" style="margin-bottom:10px;">'
    + '<div class="eyebrow">Dagens næring</div>'
    + '<button class="linkbtn" data-act="nav" data-val="mat">Logg mat →</button></div>'
    + '<div style="display:flex;justify-content:space-around;">'
    + ring(tot.kcal, mal.kcal, "Kalorier") + ring(tot.p, mal.p, "Protein", "url(#gTeal)")
    + '</div></div>';

  html += '<div class="grid2">'
  + '<div class="card clickable tight" data-act="nav" data-val="maal" style="margin-bottom:0;">'
    + '<div class="eyebrow">Vekt</div>'
    + '<div class="num" style="font-size:27px;font-weight:900;margin-top:6px;">'+(sisteVekt?sisteVekt.kg.toFixed(1):"84,5")+'<span style="font-size:13px;font-weight:700;color:var(--mist);"> kg</span></div>'
    + '<div class="small" style="font-weight:700;color:'+(sisteVekt && sisteVekt.kg<84.5?"var(--moss)":"var(--mist)")+';">'
    + (sisteVekt ? ((sisteVekt.kg-84.5<=0?"":"+")+(sisteVekt.kg-84.5).toFixed(1)+" kg fra start") : "Mål: 80–82 kg")+'</div></div>'
  + '<div class="card clickable tight" data-act="nav" data-val="maal" style="margin-bottom:0;">'
    + '<div class="eyebrow">10 km</div>'
    + '<div class="num" style="font-size:27px;font-weight:900;margin-top:6px;">'+(sisteTest?tidFmt(sisteTest.sekTotal):"47:00")+'</div>'
    + '<div class="small mist" style="font-weight:700;">Mål: 44:00–45:00</div></div>'
  + '</div>';

  html += '<div class="card" style="margin-top:14px;background:linear-gradient(135deg,rgba(255,169,77,.10),rgba(255,107,53,.06)),var(--card);">'
    + '<div class="eyebrow em">Neste milepæl · uke '+nesteMp.uke+'</div>'
    + '<div style="font-weight:700;font-size:14px;margin-top:7px;line-height:1.45;">'+esc(nesteMp.t)+'</div></div>';

  if(!S.apiKey){
    html += '<div class="card softwarn"><div class="eyebrow warn">Tips</div>'
    + '<div class="small" style="margin-top:6px;line-height:1.5;color:var(--text);">Legg inn API-nøkkelen din i innstillinger for å bruke AI-analyse av mat (tekst og bilde). Produktsøket virker uten nøkkel.</div></div>';
  }
  return html;
}

/* ================= TRENING ================= */
function oktKortHtml(icon, tittel, under, ferdig, dataAttrs, test){
  return '<div class="card clickable tight" style="margin-top:10px;margin-bottom:0;'+(test?"outline:2px solid var(--ember);":"")+'" '+dataAttrs+'>'
   + '<div class="oktrow"><div class="oktdot'+(ferdig?" done":"")+'">'+ic(ferdig?"check":icon,20)+'</div>'
   + '<div class="oktinfo"><div class="okttitle">'+esc(tittel)+'</div><div class="oktsub">'+esc(under)+'</div></div>'
   + ic("chevR",18)+'</div></div>';
}
function renderTrening(){
  if(UI.aktivOkt) return renderStyrkeSkjema(UI.aktivOkt);
  if(UI.aktivLop) return renderLopSkjema(UI.aktivLop);
  const uke = beregnUke(S.profil.startDate);
  const ukeInfo = LOPEPLAN[uke-1] || {};
  let html = segControl("treningView", UI.treningView, [["logg","Logg økt"],["grafer","Fremgang"]]);
  if(UI.treningView==="logg"){
    html += '<div style="margin-top:16px;"><div class="eyebrow">Styrke · uke '+uke+(ukeInfo.deload?' · DELOAD: halver settene':'')+'</div>';
    ["A","B","C"].forEach(k=>{
      const ferdig = S.styrkelogg.some(l=>l.uke===uke && l.okt===k);
      html += oktKortHtml("dumbbell", STYRKE[k].navn, STYRKE[k].ov.length+" øvelser", ferdig, 'data-act="open-okt" data-val="'+k+'"');
    });
    html += '</div><div style="margin-top:16px;"><div class="eyebrow">Løping · uke '+uke+'</div>';
    [["tir","Tirsdag · Intervall/terskel"],["fre","Fredag · Rolig"],["lor","Lørdag · Langtur"]].forEach(([slot,lbl])=>{
      const ferdig = S.lopelogg.some(l=>l.uke===uke && l.slot===slot);
      html += oktKortHtml("run", lbl, ukeInfo[slot]||"–", ferdig, 'data-act="open-lop" data-val="'+slot+'"', ukeInfo.test && slot==="lor");
    });
    html += '</div>';
    html += '<div class="card" style="margin-top:16px;"><div class="eyebrow">Tempo-soner</div><div style="margin-top:8px;">'
      + SONER.map(([s,t])=>'<div class="between" style="font-size:13px;padding:3px 0;"><span style="font-weight:700;">'+s+'</span><span class="mist tabnum">'+t+'</span></div>').join("")
      + '</div></div>';
  } else {
    html += '<div style="margin-top:16px;">'+renderGrafer()+'</div>';
  }
  return html;
}
function actOpenOkt(k){ UI.aktivOkt=k; UI.aktivLop=null; renderTab(); }
function actOpenLop(slot){ UI.aktivLop=slot; UI.aktivOkt=null; renderTab(); if(document.getElementById("lopKm")) oppdaterLopPace(); }
function actBackTrening(){ UI.aktivOkt=null; UI.aktivLop=null; renderTab(); }

function setRowHtml(oi, si, o, sist){
  const ph = sist && sist.sets[si];
  let row = '<div class="setrow"><div class="setidx num">'+(si+1)+'</div>';
  if(!o.tid){
    row += '<input class="input" type="text" inputmode="decimal" placeholder="'+(ph?ph.w+" kg":"kg")+'" data-ov="'+oi+'" data-f="w">';
    row += '<input class="input" type="text" inputmode="numeric" placeholder="'+(ph?ph.r+" reps":"reps")+'" data-ov="'+oi+'" data-f="r">';
  } else {
    row += '<input class="input" type="text" inputmode="numeric" placeholder="'+(ph?ph.r+" s":"sek")+'" style="grid-column:2 / 4;" data-ov="'+oi+'" data-f="r">';
  }
  return row + '</div>';
}
function renderStyrkeSkjema(okt){
  const uke = beregnUke(S.profil.startDate);
  const fI = faseIdx(uke);
  const plan = STYRKE[okt];
  const deload = (uke===8 || uke===16);
  let html = '<div class="between" style="margin-bottom:6px;">'
    + '<div class="row"><button class="icon-btn" data-act="back-trening">'+ic("chevL",24)+'</button>'
    + '<div><div style="font-weight:900;font-size:17px;">'+esc(plan.navn)+'</div>'
    + '<div class="small mist">Fase '+(fI+1)+' · '+FASER[fI].navn+(deload?' · DELOAD: halver settene':'')+'</div></div></div>'
    + '<button class="btn dark small" data-act="styrke-hent-forrige" data-okt="'+okt+'">'+ic("copy",14)+' Hent sist</button>'
    + '</div>';

  plan.ov.forEach((o, oi)=>{
    const navn = valgtOvelse(okt, oi);
    const erAlt = navn !== o.n;
    const sist = sisteForOvelse(S.styrkelogg, navn);
    const raad = radForOvelse(o, fI, sist && sist.sets);
    const setCount = o.sett[fI];
    const mn=o.reps[fI][0], mx=o.reps[fI][1];
    html += '<div class="card tight" data-slot="'+oi+'">'
      + '<div class="between" style="align-items:flex-start;gap:8px;">'
      + '<div style="min-width:0;"><div style="font-weight:800;font-size:14.5px;line-height:1.25;">'+esc(navn)+'</div>'
      + (erAlt ? '<div class="small" style="color:var(--ember);font-weight:700;">Bytte for: '+esc(o.n)+'</div>' : '')
      + (o.sup ? '<div class="small mist">'+esc(o.sup)+'</div>' : '')
      + '</div>'
      + '<div class="row" style="gap:6px;flex-shrink:0;">'
      + '<button class="timerchip" data-act="start-timer" data-sek="'+o.ps+'" data-lbl="'+esc(navn)+'">'+ic("timer",12)+' '+pauseTekst(o.ps)+'</button>'
      + '<button class="swapbtn" data-act="open-swap" data-okt="'+okt+'" data-idx="'+oi+'">'+ic("swap",14)+'</button>'
      + '</div></div>'
      + '<div class="small mist tabnum" style="margin-top:5px;">'+setCount+' sett × '+(mn===mx?mn:mn+"–"+mx)+(o.tid?" sek":" reps")+'</div>';
    if(raad) html += '<div class="pill">▲ '+esc(raad)+'</div>';
    if(sist) html += '<div class="small mist" style="margin-top:6px;">Sist ('+kortDato(sist.date)+'): '+sist.sets.map(s=> o.tid? s.r+"s" : s.w+"×"+s.r).join("  ·  ")+'</div>';
    html += '<div id="setsContainer-'+oi+'">';
    for(let si=0; si<setCount; si++) html += setRowHtml(oi, si, o, sist);
    html += '</div>';
    html += '<button type="button" class="linkbtn" style="margin-top:9px;" data-act="styrke-addset" data-okt="'+okt+'" data-idx="'+oi+'">+ Legg til sett</button>';
    html += '</div>';
  });
  html += '<button class="btn primary" data-act="styrke-save" data-okt="'+okt+'">'+ic("check",18)+' Lagre økten</button>';
  return html;
}
function actStyrkeAddSet(okt, oi){
  const o = STYRKE[okt].ov[oi];
  const navn = valgtOvelse(okt, oi);
  const c = document.getElementById("setsContainer-"+oi);
  c.insertAdjacentHTML("beforeend", setRowHtml(oi, c.children.length, o, sisteForOvelse(S.styrkelogg, navn)));
}
function actStyrkeHentForrige(okt){
  const plan = STYRKE[okt];
  let fylt = 0;
  plan.ov.forEach((o, oi)=>{
    const sist = sisteForOvelse(S.styrkelogg, valgtOvelse(okt, oi));
    if(!sist) return;
    const c = document.getElementById("setsContainer-"+oi);
    Array.from(c.children).forEach((row, si)=>{
      const ph = sist.sets[si];
      if(!ph) return;
      const wI = row.querySelector('[data-f="w"]'), rI = row.querySelector('[data-f="r"]');
      if(wI){ wI.value = ph.w || ""; fylt++; }
      if(rI){ rI.value = ph.r || ""; }
    });
  });
  toast(fylt ? "Forrige økt hentet – juster og løft tyngre 💪" : "Ingen tidligere økt å hente ennå");
}
function actStyrkeSave(okt){
  const plan = STYRKE[okt];
  const ovelser = [];
  plan.ov.forEach((o, oi)=>{
    const navn = valgtOvelse(okt, oi);
    const c = document.getElementById("setsContainer-"+oi);
    const sets = [];
    Array.from(c.children).forEach(row=>{
      if(o.tid){
        const r = tall(row.querySelector('[data-f="r"]').value);
        if(r>0) sets.push({w:0, r});
      } else {
        const w = tall(row.querySelector('[data-f="w"]').value);
        const r = tall(row.querySelector('[data-f="r"]').value);
        if(w>0 || r>0) sets.push({w, r});
      }
    });
    if(sets.length) ovelser.push({ n:navn, slot:slotKey(okt,oi), sets });
  });
  if(!ovelser.length){ toast("Fyll inn minst ett sett før du lagrer"); return; }
  S.styrkelogg.push({ id:Date.now(), date:todayStr(), uke:beregnUke(S.profil.startDate), okt, ovelser });
  persist();
  stoppTimer();
  UI.aktivOkt = null;
  renderTab();
  toast("Styrkeøkt lagret 💪");
}

/* --- Ovelsesbytte (modal) --- */
function renderSwapModal(okt, oi){
  const o = STYRKE[okt].ov[oi];
  const valgt = valgtOvelse(okt, oi);
  const alle = [o.n].concat(o.alt||[]);
  return '<div class="modal-bg" data-act="close-modal">'
   + '<div class="modal-card" data-act="noop">'
   + '<div class="between" style="margin-bottom:6px;"><div style="font-weight:900;font-size:18px;">Bytt øvelse</div>'
   + '<button class="icon-btn" data-act="close-modal">'+ic("x",22)+'</button></div>'
   + '<div class="small mist" style="margin-bottom:14px;">Samme sett og reps gjelder. Historikk og progresjonsråd følger øvelsen du velger. Feltene i skjemaet tømmes ved bytte.</div>'
   + alle.map((navn,i)=>'<div class="varrow'+(navn===valgt?" valgt":"")+'" data-act="velg-variant" data-okt="'+okt+'" data-idx="'+oi+'" data-navn="'+esc(navn)+'">'
      + '<div style="flex:1;">'+esc(navn)+(i===0?' <span class="small mist" style="font-weight:600;">· original</span>':'')+'</div>'
      + (navn===valgt ? '<span style="color:var(--ember);">'+ic("check",18)+'</span>' : '')
      + '</div>').join("")
   + '</div></div>';
}
function actOpenSwap(okt, oi){ document.getElementById("modalRoot").innerHTML = renderSwapModal(okt, oi); }
function actVelgVariant(okt, oi, navn){
  const base = STYRKE[okt].ov[oi];
  if(navn === base.n) delete S.oppsett[slotKey(okt,oi)];
  else S.oppsett[slotKey(okt,oi)] = navn;
  persist();
  closeModal();
  renderTab();
}
function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function renderLopSkjema(slot){
  const uke = beregnUke(S.profil.startDate);
  const ukeInfo = LOPEPLAN[uke-1] || {};
  const erTest = ukeInfo.test && slot==="lor";
  const lbl = {tir:"Tirsdag · Intervall/terskel", fre:"Fredag · Rolig", lor:"Lørdag · Langtur"}[slot];
  let html = '<div class="row" style="margin-bottom:6px;">'
    + '<button class="icon-btn" data-act="back-trening">'+ic("chevL",24)+'</button>'
    + '<div><div style="font-weight:900;font-size:17px;">'+lbl+'</div><div class="small mist">Uke '+uke+'</div></div></div>';
  html += '<div class="card'+(erTest?" softwarn":"")+'"><div class="eyebrow'+(erTest?" warn":"")+'">'+(erTest?"Testløp!":"Dagens økt")+'</div>'
    + '<div style="font-weight:700;margin-top:6px;font-size:14.5px;">'+esc(ukeInfo[slot]||"Fri økt")+'</div>'
    + (slot==="tir" ? '<div class="small mist" style="margin-top:4px;">Husk 10–15 min rolig oppvarming og 5–10 min nedjogg.</div>' : "")
    + '</div>';
  html += '<div class="card"><div class="grid3">'
    + '<div><div class="eyebrow">Km</div><div style="margin-top:6px;"><input class="input" type="text" inputmode="decimal" placeholder="8,0" id="lopKm" value="'+(erTest?"10":"")+'"></div></div>'
    + '<div><div class="eyebrow">Min</div><div style="margin-top:6px;"><input class="input" type="text" inputmode="numeric" placeholder="45" id="lopMin"></div></div>'
    + '<div><div class="eyebrow">Sek</div><div style="margin-top:6px;"><input class="input" type="text" inputmode="numeric" placeholder="30" id="lopSek"></div></div>'
    + '</div>'
    + '<div class="between" style="margin-top:12px;"><div class="eyebrow">Tempo</div>'
    + '<div class="num" id="lopPaceOut" style="font-size:24px;font-weight:900;color:var(--mist);">– <span style="font-size:12px;font-weight:700;">/km</span></div></div>'
    + '<div style="margin-top:10px;"><input class="input" placeholder="Notat (følelse, vær, drag-tider …)" id="lopNotat"></div>'
    + '</div>';
  html += '<button class="btn primary" id="lopSaveBtn" data-act="lop-save" data-slot="'+slot+'" disabled>'+ic("check",18)+' Lagre løpeøkten</button>';
  return html;
}
function oppdaterLopPace(){
  const km = tall((document.getElementById("lopKm")||{}).value);
  const min = tall((document.getElementById("lopMin")||{}).value);
  const sek = tall((document.getElementById("lopSek")||{}).value);
  const tot = min*60+sek;
  const pace = km>0 && tot>0 ? tot/km : 0;
  const out = document.getElementById("lopPaceOut");
  const btn = document.getElementById("lopSaveBtn");
  if(!out || !btn) return;
  if(pace>0){ out.innerHTML = paceFmt(pace)+' <span style="font-size:12px;font-weight:700;">/km</span>'; out.style.color="var(--text)"; btn.disabled=false; }
  else { out.innerHTML = '– <span style="font-size:12px;font-weight:700;">/km</span>'; out.style.color="var(--mist)"; btn.disabled=true; }
}
function actLopSave(slot){
  const km = tall(document.getElementById("lopKm").value);
  const min = tall(document.getElementById("lopMin").value);
  const sek = tall(document.getElementById("lopSek").value);
  const notat = document.getElementById("lopNotat").value || "";
  const tot = min*60+sek;
  if(!(km>0 && tot>0)) return;
  const uke = beregnUke(S.profil.startDate);
  const ukeInfo = LOPEPLAN[uke-1]||{};
  const erTest = ukeInfo.test && slot==="lor";
  S.lopelogg.push({ id:Date.now(), date:todayStr(), uke, slot,
    type: erTest?"test":(slot==="tir"?"intervall":slot==="lor"?"langtur":"rolig"),
    km, sekTotal:tot, pace:tot/km, notat });
  persist();
  UI.aktivLop = null;
  renderTab();
  toast(erTest ? "Testløp lagret 🏁" : "Løpeøkt lagret 🏃");
}

function renderGrafer(){
  const planNavn = [].concat(STYRKE.A.ov, STYRKE.B.ov, STYRKE.C.ov).filter(o=>!o.tid).map(o=>o.n);
  const loggNavn = [];
  S.styrkelogg.forEach(l=>(l.ovelser||[]).forEach(o=>{ if(loggNavn.indexOf(o.n)<0) loggNavn.push(o.n); }));
  const alle = planNavn.slice();
  loggNavn.forEach(n=>{ if(alle.indexOf(n)<0) alle.push(n); });
  if(!UI.ovelseGraf || alle.indexOf(UI.ovelseGraf)<0) UI.ovelseGraf = alle[0];

  let html = '<div class="card"><div class="eyebrow">Styrke · estimert 1RM (beste sett)</div>';
  html += '<select class="input" id="ovelseSelect" style="margin-top:8px;">'+alle.map(n=>
    '<option value="'+esc(n)+'"'+(n===UI.ovelseGraf?" selected":"")+'>'+esc(n)+'</option>').join("")+'</select>';
  const rader = [];
  S.styrkelogg.forEach(l=>{
    const o = (l.ovelser||[]).find(x=>x.n===UI.ovelseGraf);
    if(!o) return;
    const best = Math.max.apply(null, o.sets.map(s=>e1rm(s.w,s.r)));
    if(isFinite(best) && best>0) rader.push({ lbl:kortDato(l.date), y:Math.round(best*10)/10 });
  });
  html += '<div class="chartwrap">'+(rader.length>=2
    ? svgLine(rader, {fmtY:v=>v+" kg"})
    : emptyChart("Logg minst to økter med denne øvelsen, så tegnes grafen her."))+'</div></div>';

  html += '<div class="card"><div class="between"><div class="eyebrow">Løping</div>'
    + segControl("lopVisning", UI.lopVisning, [["tempo","Tempo"],["volum","Km/uke"]])+'</div>';
  if(UI.lopVisning==="tempo"){
    const td = S.lopelogg.filter(l=>l.pace>0).map(l=>({lbl:kortDato(l.date), y:Math.round(l.pace)}));
    html += '<div class="chartwrap">'+(td.length>=2 ? svgLine(td,{color:"var(--teal)",reversed:true,fmtY:paceFmt}) : emptyChart("Logg minst to løpeøkter, så ser du tempoutviklingen (lavere = raskere)."))+'</div>';
  } else {
    const per = {};
    S.lopelogg.forEach(l=>{ per[l.uke]=(per[l.uke]||0)+(l.km||0); });
    const vd = Object.keys(per).sort((a,b)=>a-b).map(u=>({lbl:"u"+u, y:Math.round(per[u]*10)/10}));
    html += '<div class="chartwrap">'+(vd.length>=1 ? svgBar(vd) : emptyChart("Ukesvolumet dukker opp her når du logger løpeøkter."))+'</div>';
  }
  html += '</div>';
  return html;
}

/* ================= MAT ================= */
function matFeilmelding(e){
  const msg = (e && e.message) || "";
  if(msg==="NOKKEL_MANGLER") return "Legg inn API-nøkkelen din i innstillinger først.";
  if(msg==="NOKKEL_UGYLDIG") return "API-nøkkelen ble avvist – sjekk den i innstillinger.";
  if(e instanceof TypeError || msg.indexOf("fetch")>=0) return "Ingen nettkontakt – prøv igjen.";
  return "Fikk ikke analysert – prøv igjen, eller bruk søk/manuelt.";
}
function dagDataFor(dato){ return S.mat[dato] || { type: standardDagtype(dato), items: [], vann: 0 }; }
function leggTilMatItems(items, kilde){
  const dato = UI.matDato;
  const d = dagDataFor(dato);
  d.items = d.items.concat(items.map(it=>Object.assign({}, it, { id: Date.now()+Math.random(), kilde })));
  S.mat[dato] = d; persist();
}
function actMatPrevDay(){ const d=parseDstr(UI.matDato); d.setDate(d.getDate()-1); UI.matDato=dstr(d); nullstillMatUI(); renderTab(); }
function actMatNextDay(){ const d=parseDstr(UI.matDato); d.setDate(d.getDate()+1); const ny=dstr(d); if(ny>todayStr()) return; UI.matDato=ny; nullstillMatUI(); renderTab(); }
function nullstillMatUI(){ UI.matFeil=""; UI.matTekstVal=""; UI.offRes=null; UI.offValgt=-1; UI.sokVal=""; }
function actMatType(t){ const d=dagDataFor(UI.matDato); d.type=t; S.mat[UI.matDato]=d; persist(); renderTab(); }
function actVann(delta){
  const d = dagDataFor(UI.matDato);
  d.vann = Math.max(0, (d.vann||0) + delta);
  S.mat[UI.matDato] = d; persist(); renderTab();
}
function actMatDeleteItem(id){
  const d = S.mat[UI.matDato]; if(!d) return;
  d.items = d.items.filter(i=>String(i.id)!==String(id));
  S.mat[UI.matDato] = d; persist(); renderTab();
}
function erFavoritt(navn){ return S.fav.some(f=>f.navn===navn); }
function actStarToggle(id){
  const d = S.mat[UI.matDato]; if(!d) return;
  const it = d.items.find(i=>String(i.id)===String(id)); if(!it) return;
  if(erFavoritt(it.navn)){ S.fav = S.fav.filter(f=>f.navn!==it.navn); toast("Fjernet fra favoritter"); }
  else { S.fav.push({navn:it.navn, kcal:it.kcal, p:it.p, k:it.k, f:it.f}); toast("Lagret som favoritt ⭐"); }
  persist(); renderTab();
}
function byggChips(){
  const chips = S.fav.map(f=>Object.assign({fav:true}, f));
  const sett = {}; chips.forEach(c=>sett[c.navn]=1);
  const datoer = Object.keys(S.mat).sort().reverse().slice(0, 14);
  outer:
  for(const dt of datoer){
    const items = (S.mat[dt].items||[]).slice().reverse();
    for(const it of items){
      if(sett[it.navn]) continue;
      sett[it.navn] = 1;
      chips.push({navn:it.navn, kcal:it.kcal, p:it.p, k:it.k, f:it.f, fav:false});
      if(chips.length >= 10) break outer;
    }
  }
  return chips;
}
function actChipAdd(i){
  const c = (UI.chips||[])[i]; if(!c) return;
  leggTilMatItems([{navn:c.navn, kcal:c.kcal, p:c.p, k:c.k, f:c.f}], "hurtig");
  renderTab(); toast("Lagt til: "+c.navn);
}
async function actMatAnalyserTekst(){
  const inp = document.getElementById("matTekstInput");
  const tekst = (inp ? inp.value : "").trim();
  if(!tekst) return;
  UI.matTekstVal = tekst;
  UI.matJobber = true; UI.matFeil = ""; renderTab();
  try{
    const items = await aiAnalyserMat(tekst, null);
    leggTilMatItems(items, "ai"); UI.matTekstVal = "";
  }catch(e){ UI.matFeil = matFeilmelding(e); }
  UI.matJobber = false; renderTab();
}
function actMatPhotoPick(){ if(!UI.matJobber) document.getElementById("matFileInput").click(); }
function actMatPhotoChange(file){
  if(!file) return;
  if(!S.apiKey){ UI.matFeil = "Legg inn API-nøkkelen din i innstillinger først."; renderTab(); return; }
  const tekst = ((document.getElementById("matTekstInput")||{}).value||"").trim();
  UI.matJobber = true; UI.matFeil = ""; renderTab();
  const reader = new FileReader();
  reader.onload = async function(){
    try{
      const m = String(reader.result).match(/^data:(.+?);base64,(.*)$/);
      if(!m) throw new Error("BILDE_FEIL");
      const items = await aiAnalyserMat(tekst, { mediaType:m[1], data:m[2] });
      leggTilMatItems(items, "foto"); UI.matTekstVal = "";
    }catch(e){ UI.matFeil = matFeilmelding(e); }
    UI.matJobber = false; renderTab();
  };
  reader.onerror = function(){ UI.matFeil="Kunne ikke lese bildet."; UI.matJobber=false; renderTab(); };
  reader.readAsDataURL(file);
}
async function actOffSok(){
  const inp = document.getElementById("offSokInput");
  const q = (inp ? inp.value : "").trim();
  if(!q) return;
  UI.sokVal = q; UI.offSokJobber = true; UI.offRes = null; UI.offValgt = -1; renderTab();
  const res = await offSok(q);
  UI.offSokJobber = false; UI.offRes = res; renderTab();
}
function actOffVelg(i){ UI.offValgt = (UI.offValgt===i ? -1 : i); renderTab(); if(UI.offValgt>=0){ const g=document.getElementById("offGram"); if(g){ g.focus(); } oppdaterOffPreview(); } }
function offBeregn(prod, gram){
  const f = gram/100;
  return { navn: prod.navn + (prod.merke ? " ("+prod.merke+")" : "") + " · " + gram + " g",
    kcal: Math.round(prod.kcal100*f), p: Math.round(prod.p100*f), k: Math.round(prod.k100*f), f2: Math.round(prod.f100*f) };
}
function oppdaterOffPreview(){
  const el = document.getElementById("offPreview");
  if(!el || UI.offValgt<0 || !UI.offRes) return;
  const gram = tall((document.getElementById("offGram")||{}).value) || 0;
  if(gram<=0){ el.textContent = "Skriv inn gram"; return; }
  const b = offBeregn(UI.offRes[UI.offValgt], gram);
  el.textContent = b.kcal+" kcal · P "+b.p+" · K "+b.k+" · F "+b.f2;
}
function actOffAdd(){
  if(UI.offValgt<0 || !UI.offRes) return;
  const gram = tall((document.getElementById("offGram")||{}).value) || 0;
  if(gram<=0){ toast("Skriv inn antall gram"); return; }
  const b = offBeregn(UI.offRes[UI.offValgt], gram);
  leggTilMatItems([{navn:b.navn, kcal:b.kcal, p:b.p, k:b.k, f:b.f2}], "sok");
  UI.offValgt = -1;
  renderTab(); toast("Lagt til fra produktsøk");
}
function actMatManuellSave(){
  const navn = (document.getElementById("mNavn").value||"").trim();
  const kcalRaw = document.getElementById("mKcal").value;
  if(!navn || kcalRaw===""){ toast("Fyll inn minst navn og kalorier"); return; }
  leggTilMatItems([{ navn, kcal:Math.round(tall(kcalRaw)), p:Math.round(tall(document.getElementById("mP").value)),
    k:Math.round(tall(document.getElementById("mK").value)), f:Math.round(tall(document.getElementById("mF").value)) }], "manuell");
  renderTab(); toast("Lagt til");
}

function actMatEdit(id){

  html += '</div>';

  // Dagens liste
  html += '<div class="card"><div class="eyebrow">Logget '+(erIdag?"i dag":kortDato(dato))+'</div>';
  if(!d.items.length){
    html += '<div class="small mist" style="margin-top:10px;line-height:1.55;">Ingenting logget ennå. Søk opp et produkt, bruk AI, eller trykk på et hurtigvalg.</div>';
  } else {
    html += '<div style="margin-top:6px;">'+d.items.map(it=>
      '<div class="food-item">'

      + '<div class="small mist tabnum">'+it.kcal+' kcal · P '+it.p+' · K '+it.k+' · F '+it.f
      + (it.kilde==="ai"||it.kilde==="foto" ? ' · AI' : it.kilde==="sok" ? ' · søk' : '')+'</div></div>'

  html += '</div>';
  return html;
}

function renderMaal(){
  const vekt = S.kropp.vekt, midje = S.kropp.midje;
  const grense = new Date(); grense.setDate(grense.getDate()-7);
  const siste7 = vekt.filter(v=>parseDstr(v.date) >= grense);
  const snitt7 = siste7.length ? siste7.reduce((a,v)=>a+v.kg,0)/siste7.length : null;
  const vektData = vekt.map(v=>({lbl:kortDato(v.date), y:v.kg}));

  let html = '<div class="card"><div class="between" style="align-items:baseline;">'
   + '<div class="eyebrow">Kroppsvekt · mål 80–82 kg</div>'
   + (snitt7 ? '<span class="small mist tabnum">Snitt 7 d: <b style="color:var(--text);">'+snitt7.toFixed(1)+'</b></span>' : '')
   + '</div>'
   + '<div class="row" style="margin-top:10px;"><input class="input" type="text" inputmode="decimal" placeholder="Dagens vekt (kg)" id="vektInput">'
   + '<button class="btn primary small" data-act="maal-add-vekt">'+ic("plus",16)+'</button></div>'
   + '<div class="chartwrap">'+(vektData.length>=2

      : emptyChart("Vei deg 3 morgener i uken. Grønn sone = målet (80–82 kg), stiplet linje = start."))+'</div></div>';

  html += '<div class="card"><div class="eyebrow">Midjemål (ved navlen) · hver 4. uke</div>'
   + '<div class="row" style="margin-top:10px;"><input class="input" type="text" inputmode="decimal" placeholder="cm" id="midjeInput">'

   + '<div class="grid3" style="margin-top:10px;">'
   + '<input class="input" type="text" inputmode="numeric" placeholder="min" id="testMin">'
   + '<input class="input" type="text" inputmode="numeric" placeholder="sek" id="testSek">'
   + '<button class="btn primary small" data-act="maal-add-test">'+ic("plus",16)+'</button></div>';
  if(!tester.length){
    html += '<div class="small mist" style="margin-top:10px;">Registrer testløpene fra uke 12 og 24 her.</div>';
  } else {
    html += '<div style="margin-top:8px;">'+tester.map(t=>{
      const diff = 2820 - t.sekTotal;
      return '<div class="between" style="padding:9px 0;border-bottom:1px solid var(--line);">'
       + '<span class="small mist">'+kortDato(t.date)+' · uke '+t.uke+'</span>'
       + '<span class="num" style="font-weight:900;">'+tidFmt(t.sekTotal)
       + ' <span style="font-size:12px;margin-left:8px;color:'+(diff>=0?"var(--moss)":"var(--warn)")+';">'+(diff>=0?"−":"+")+tidFmt(Math.abs(diff))+' vs start</span></span></div>';
    }).join("")+'</div>';
  }
  html += '</div>';

  const mp = (S.profil.mp)||{};
  html += '<div class="card"><div class="eyebrow">Milepæler</div><div style="margin-top:6px;">'
   + MILEPAELER.map(m=>{
     const on = !!mp[m.uke];

   }).join("")+'</div></div>';
  return html;
}
function actMaalAddVekt(){
  const kg = tall(document.getElementById("vektInput").value);
  if(!(kg>30 && kg<250)){ toast("Sjekk tallet du skrev inn"); return; }
  S.kropp.vekt = S.kropp.vekt.filter(v=>v.date!==todayStr()).concat([{date:todayStr(), kg}]).sort((a,b)=>a.date<b.date?-1:1);
  persist(); renderTab(); toast("Vekt lagret");
}
function actMaalAddMidje(){
  const cm = tall(document.getElementById("midjeInput").value);
  if(!(cm>40 && cm<200)){ toast("Sjekk tallet du skrev inn"); return; }
  S.kropp.midje = S.kropp.midje.filter(v=>v.date!==todayStr()).concat([{date:todayStr(), cm}]).sort((a,b)=>a.date<b.date?-1:1);
  persist(); renderTab(); toast("Midjemål lagret");
}
function actMaalAddTest(){
  const min = tall(document.getElementById("testMin").value), sek = tall(document.getElementById("testSek").value);
  const tot = min*60+sek;
  if(!(tot>1200 && tot<7200)){ toast("Sjekk tiden du skrev inn"); return; }
  S.lopelogg.push({ id:Date.now(), date:todayStr(), uke:beregnUke(S.profil.startDate), slot:"test", type:"test", km:10, sekTotal:tot, pace:tot/10, notat:"10 km-test" });
  persist(); renderTab(); toast("Testløp lagret 🏁");
}
function actMaalToggleMp(uke){
  S.profil.mp = S.profil.mp || {};
  S.profil.mp[uke] = !S.profil.mp[uke];
  persist(); renderTab();
}

/* ================= INNSTILLINGER ================= */
function renderInnstillinger(){
  return '<div class="modal-bg" data-act="close-modal"><div class="modal-card" data-act="noop">'
   + '<div class="between" style="margin-bottom:14px;"><div style="font-weight:900;font-size:18px;">Innstillinger</div>'
   + '<button class="icon-btn" data-act="close-modal">'+ic("x",22)+'</button></div>'

   + '<div class="card"><div class="between"><div class="eyebrow">Utseende</div>'
   + segControl("tema", S.tema, [["dark","Mørk"],["light","Lys"]])+'</div></div>'

   + '<div class="card"><div class="between" style="margin-bottom:7px;"><div class="eyebrow">AI-modell (matanalyse)</div>'
   + segControl("aiModell", S.aiModell, [["haiku","Haiku · rask"],["sonnet","Sonnet · nøyaktig"]])+'</div>'
   + '<div class="small mist" style="line-height:1.5;">Haiku: ~2–4 øre per bildeanalyse. Sonnet: ~5–10 øre, men merkbart mer treffsikker på porsjoner og sammensatte retter.</div></div>'

   + '<div class="card"><div class="row" style="margin-bottom:2px;">'+ic("key",15)+'<div class="eyebrow">Anthropic API-nøkkel</div></div>'
   + '<div class="small mist" style="margin:6px 0 10px;line-height:1.5;">Kun for AI-analyse. Lagres bare lokalt på telefonen. Hentes på platform.claude.com → API Keys.</div>'
   + '<input class="input" type="password" id="apiKeyInput" placeholder="sk-ant-…" value="'+esc(S.apiKey||"")+'">'
   + '<button class="btn dark small" style="margin-top:10px;" data-act="settings-save-key">Lagre nøkkel</button></div>'

   + '<div class="card"><div class="eyebrow">Startdato (uke 1)</div>'
   + '<div class="row" style="margin-top:8px;"><input class="input" type="date" id="startDatoInput" value="'+S.profil.startDate+'">'
   + '<button class="btn dark small" data-act="settings-save-date">Lagre</button></div></div>'

   + '<div class="card"><div class="eyebrow">Sikkerhetskopi</div>'
   + '<div class="small mist" style="margin:6px 0 10px;line-height:1.5;">Alt lagres kun på denne telefonen. Ta jevnlig backup – da er du trygg selv om nettleserdata skulle bli slettet.</div>'
   + '<div class="btn-row">'
   + '<button class="btn dark small" data-act="backup-export">'+ic("download",14)+' Eksporter</button>'
   + '<button class="btn ghost small" data-act="backup-import-pick">'+ic("upload",14)+' Importer</button>'
   + '</div><input type="file" accept=".json,application/json" id="backupFileInput" style="display:none;"></div>'

   + '<div class="card"><div class="eyebrow warn">Faresone</div>'
   + '<div class="small mist" style="margin:6px 0 10px;">Sletter all logget trening, mat og målinger permanent fra denne telefonen.</div>'
   + (UI.resetConfirm
     ? '<div class="btn-row"><button class="btn soft small" data-act="settings-reset-yes">Ja, slett alt</button><button class="btn ghost small" data-act="settings-reset-cancel">Avbryt</button></div>'
     : '<button class="btn ghost small" data-act="settings-reset-show">Nullstill alle data…</button>')
   + '</div></div></div>';
}
function actOpenSettings(){ UI.resetConfirm=false; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actSettingsSaveKey(){
  S.apiKey = (document.getElementById("apiKeyInput").value||"").trim();
  persist(); closeModal(); renderTab();
  toast(S.apiKey ? "API-nøkkel lagret" : "API-nøkkel fjernet");
}
function actSettingsSaveDate(){
  const v = document.getElementById("startDatoInput").value;
  if(!v) return;
  S.profil.startDate = v; persist(); closeModal(); renderTab(); toast("Startdato oppdatert");
}
function actBackupExport(){
  try{
    const blob = new Blob([JSON.stringify(S, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "prosjekt24-backup-"+todayStr()+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>{ try{ URL.revokeObjectURL(a.href); }catch(e){} }, 3000);
    toast("Sikkerhetskopi lastet ned 📦");
  }catch(e){ toast("Klarte ikke eksportere"); }
}
function actBackupImportPick(){ document.getElementById("backupFileInput").click(); }
function actBackupImport(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const p = JSON.parse(String(reader.result));
      if(!p || typeof p!=="object" || !("styrkelogg" in p || "mat" in p || "profil" in p)) throw new Error("format");
      S = Object.assign(defaultState(), p);
      S.kropp = Object.assign({vekt:[],midje:[]}, p.kropp||{});
      S.mat = p.mat||{}; S.oppsett = p.oppsett||{}; S.fav = Array.isArray(p.fav)?p.fav:[];
      persist(); applyTheme(); closeModal(); boot();
      toast("Sikkerhetskopi gjenopprettet ✅");
    }catch(e){ toast("Ugyldig backup-fil"); }
  };
  reader.readAsText(file);
}
function actSettingsResetShow(){ UI.resetConfirm=true; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actSettingsResetCancel(){ UI.resetConfirm=false; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actSettingsResetYes(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  S = defaultState();
  UI = { tab:"hjem", treningView:"logg", aktivOkt:null, aktivLop:null, matDato:todayStr(),
         matMetode:"sok", lopVisning:"tempo", ovelseGraf:null, resetConfirm:false,
         matFeil:"", matJobber:false, matTekstVal:"", offRes:null, offValgt:-1, offSokJobber:false, sokVal:"" };
  closeModal(); applyTheme(); boot();
}

/* ================= DISPATCH + OPPSTART ================= */
document.addEventListener("click", function(e){
  const segBtn = e.target.closest(".seg button");
  if(segBtn){
    const wrap = segBtn.closest("[data-seg]");
    const segName = wrap.getAttribute("data-seg");
    const val = segBtn.getAttribute("data-val");
    if(segName==="matType"){ actMatType(val); return; }
    if(segName==="tema"){ S.tema=val; persist(); applyTheme(); document.getElementById("modalRoot").innerHTML = renderInnstillinger(); renderTab(); return; }
    if(segName==="aiModell"){ S.aiModell=val; persist(); document.getElementById("modalRoot").innerHTML = renderInnstillinger(); return; }
    if(segName==="treningView") UI.treningView = val;
    else if(segName==="lopVisning") UI.lopVisning = val;
    else if(segName==="matMetode"){ UI.matMetode = val; UI.matFeil=""; }
    renderTab();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act = el.getAttribute("data-act");
  const val = el.getAttribute("data-val");
  if(act==="noop") return;
  if(act==="nav") setTab(val);
  else if(act==="open-settings") actOpenSettings();
  else if(act==="close-modal") closeModal();
  else if(act==="onboarding-start") actOnboardingStart();
  else if(act==="open-okt") actOpenOkt(val);
  else if(act==="open-lop") actOpenLop(val);
  else if(act==="back-trening") actBackTrening();
  else if(act==="open-swap") actOpenSwap(el.getAttribute("data-okt"), Number(el.getAttribute("data-idx")));
  else if(act==="velg-variant") actVelgVariant(el.getAttribute("data-okt"), Number(el.getAttribute("data-idx")), el.getAttribute("data-navn"));
  else if(act==="start-timer") startTimer(Number(el.getAttribute("data-sek"))||90, el.getAttribute("data-lbl")||"Pause");
  else if(act==="timer-plus") timerPlus(15);
  else if(act==="timer-stop") stoppTimer();
  else if(act==="styrke-addset") actStyrkeAddSet(el.getAttribute("data-okt"), Number(el.getAttribute("data-idx")));
  else if(act==="styrke-hent-forrige") actStyrkeHentForrige(el.getAttribute("data-okt"));
  else if(act==="styrke-save") actStyrkeSave(el.getAttribute("data-okt"));
  else if(act==="lop-save") actLopSave(el.getAttribute("data-slot"));
  else if(act==="mat-prev") actMatPrevDay();
  else if(act==="mat-next") actMatNextDay();
  else if(act==="off-sok") actOffSok();
  else if(act==="off-velg") actOffVelg(Number(el.getAttribute("data-i")));
  else if(act==="off-add") actOffAdd();
  else if(act==="mat-analyser") actMatAnalyserTekst();
  else if(act==="mat-photo") actMatPhotoPick();
  else if(act==="mat-manuell-save") actMatManuellSave();
  else if(act==="mat-delete") actMatDeleteItem(el.getAttribute("data-id"));
  else if(act==="mat-edit") actMatEdit(el.getAttribute("data-id"));
  else if(act==="edit-save") actEditSave(el.getAttribute("data-id"));
  else if(act==="star-toggle") actStarToggle(el.getAttribute("data-id"));
  else if(act==="chip-add") actChipAdd(Number(el.getAttribute("data-i")));
  else if(act==="vann") actVann(Number(el.getAttribute("data-d")));
  else if(act==="maal-add-vekt") actMaalAddVekt();
  else if(act==="maal-add-midje") actMaalAddMidje();
  else if(act==="maal-add-test") actMaalAddTest();
  else if(act==="maal-toggle-mp") actMaalToggleMp(Number(val));
  else if(act==="settings-save-key") actSettingsSaveKey();
  else if(act==="settings-save-date") actSettingsSaveDate();
  else if(act==="backup-export") actBackupExport();
  else if(act==="backup-import-pick") actBackupImportPick();
  else if(act==="settings-reset-show") actSettingsResetShow();
  else if(act==="settings-reset-cancel") actSettingsResetCancel();
  else if(act==="settings-reset-yes") actSettingsResetYes();
});
document.addEventListener("input", function(e){
  if(!e.target) return;
  if(e.target.id==="lopKm" || e.target.id==="lopMin" || e.target.id==="lopSek") oppdaterLopPace();
  else if(e.target.id==="offGram") oppdaterOffPreview();
});
document.addEventListener("change", function(e){
  if(!e.target) return;
  if(e.target.id==="matFileInput"){ const f=e.target.files && e.target.files[0]; actMatPhotoChange(f); e.target.value=""; }
  else if(e.target.id==="backupFileInput"){ const f=e.target.files && e.target.files[0]; actBackupImport(f); e.target.value=""; }
  else if(e.target.id==="ovelseSelect"){ UI.ovelseGraf = e.target.value; renderTab(); }
});
document.addEventListener("keydown", function(e){
  if(e.key==="Enter" && e.target && e.target.id==="offSokInput"){ e.preventDefault(); actOffSok(); }
});

function boot(){
  applyTheme();
  const app = document.getElementById("app");
  if(!S.profil){ app.innerHTML = renderOnboarding(); return; }
  app.innerHTML = renderShell();
  renderTab();
}
boot();
</script>
