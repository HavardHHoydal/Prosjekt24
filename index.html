<style>
:root{
  --ink:#0E2A33; --ink2:#16404D; --paper:#F2F5F4; --card:#FFFFFF;
  --ember:#E8622C; --ember-soft:#FBE3D7; --moss:#2E7D5B; --moss-soft:#DDEEE6;
  --mist:#7C949B; --line:#DFE8E9; --warn:#B3541E;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  color:var(--ink); -webkit-tap-highlight-color:transparent; overscroll-behavior-y:none;
}
input,select,button,textarea{font-family:inherit;}
.wrap{max-width:480px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 16px 100px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.brand{font-weight:900;font-size:15px;letter-spacing:.02em;}
.brand span{color:var(--ember);}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--mist);display:flex;}
.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 1px 2px rgba(14,42,51,.06),0 4px 14px rgba(14,42,51,.05);border:1px solid var(--line);margin-bottom:14px;}
.card.clickable{cursor:pointer;}
.card.dark{background:var(--ink2);border:none;color:#fff;}
.card.tight{padding:14px;}
.card.soft{background:var(--ember-soft);}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);}
.eyebrow.light{color:rgba(255,255,255,.6);}
.eyebrow.warn{color:var(--warn);}
h1,h2,h3,p{margin:0;}
.btn{border:none;border-radius:12px;font-weight:700;cursor:pointer;padding:13px 16px;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.btn.small{padding:8px 12px;font-size:13px;width:auto;}
.btn.primary{background:var(--ember);color:#fff;}
.btn.dark{background:var(--ink);color:#fff;}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn.soft{background:var(--ember-soft);color:var(--warn);}
.btn:disabled{opacity:.5;}
.btn-row{display:flex;gap:8px;}
.input{width:100%;box-sizing:border-box;padding:11px 12px;border-radius:12px;border:1.5px solid var(--line);background:#FAFCFB;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums;}
select.input{-webkit-appearance:none;appearance:none;}
.seg{display:flex;background:#E4EBEA;border-radius:13px;padding:4px;gap:0;}
.seg button{flex:1;padding:9px 0;border-radius:10px;border:none;font-weight:700;font-size:13.5px;cursor:pointer;background:transparent;color:var(--mist);}
.seg button.active{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(14,42,51,.12);}
.hr{border:none;border-top:1px solid var(--line);margin:4px 0;}
.row{display:flex;align-items:center;gap:10px;}
.between{display:flex;justify-content:space-between;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.mist{color:var(--mist);}
.small{font-size:12px;}
.tabnum{font-variant-numeric:tabular-nums;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);z-index:50;}
.bottomnav-inner{max-width:480px;margin:0 auto;display:flex;padding:8px 8px calc(10px + env(safe-area-inset-bottom));}
.navbtn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--mist);}
.navbtn svg{width:22px;height:22px;}
.navbtn.active{color:var(--ink);}
.navbtn.active svg{color:var(--ember);}
.navlbl{font-size:10.5px;font-weight:700;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:12px;font-weight:700;font-size:13.5px;z-index:65;box-shadow:0 6px 20px rgba(14,42,51,.3);white-space:nowrap;}
.oktrow{display:flex;align-items:center;gap:12px;}
.oktdot{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--ember-soft);color:var(--warn);}
.oktdot svg{width:20px;height:20px;}
.oktdot.done{background:var(--moss-soft);color:var(--moss);}
.oktinfo{flex:1;min-width:0;}
.okttitle{font-weight:800;font-size:14.5px;}
.oktsub{font-size:12.5px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pill{font-size:12px;font-weight:700;color:var(--moss);background:var(--moss-soft);border-radius:8px;padding:5px 9px;display:inline-block;margin-top:6px;}
.setrow{display:grid;grid-template-columns:26px 1fr 1fr;gap:8px;align-items:center;margin-top:7px;}
.setidx{font-size:12px;font-weight:800;color:var(--mist);text-align:center;}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.ring-num{font-size:18px;font-weight:800;color:var(--ink);}
.ring-lbl{font-size:9px;color:var(--mist);}
.bar-track{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:6px;}
.uke-line{display:flex;gap:3px;}
.uke-seg{flex:1;border-radius:3px;background:rgba(255,255,255,.22);}
.uke-seg.done{background:rgba(255,255,255,.9);}
.uke-seg.now{background:var(--ember);}
.fase-lbl{flex:1;text-align:center;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:700;}
.food-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);}
.food-item:last-child{border-bottom:none;}
.milerow{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.milerow:last-child{border-bottom:none;}
.mchk{width:22px;height:22px;border-radius:7px;flex-shrink:0;margin-top:1px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;}
.mchk.on{background:var(--moss);border-color:var(--moss);}

function dstr(d){ d = d || new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseDstr(s){ const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }
function todayStr(){ return dstr(); }
function beregnUke(startDate){
  if(!startDate) return 1;
  const diff = Math.floor((parseDstr(dstr()) - parseDstr(startDate)) / 86400000);
  return Math.min(24, Math.max(1, Math.floor(diff/7)+1));
}
function faseIdx(uke){ return uke<=8 ? 0 : uke<=16 ? 1 : 2; }
function paceFmt(sec){ if(!isFinite(sec)||sec<=0) return "–"; const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+String(s).padStart(2,"0"); }
function tidFmt(sec){ const m=Math.floor(sec/60), s=Math.round(sec%60); return m+":"+String(s).padStart(2,"0"); }
function kortDato(iso){ return iso.slice(8,10)+"."+iso.slice(5,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function e1rm(w,r){ return (Number(w)||0) * (1 + (Number(r)||0)/30); }

function radForOvelse(ov, fIdx, sisteSets){
  if(!sisteSets || !sisteSets.length) return null;
  const mx = ov.reps[fIdx][1];
  const alle = sisteSets.every(s => (Number(s.r)||0) >= mx);
  if(!alle) return null;
  if(ov.tid) return "Maks tid på alle sett – legg på vektskive eller +10 s";
  if(ov.inc === 0) return "Topp reps på alle sett – øk reps eller heng på vekt";
  return "Klart sist – øk +" + ov.inc + " kg i dag";
}
function sisteForOvelse(logg, navn){

    if(f && f.sets && f.sets.length) return { date: logg[i].date, sets: f.sets };
  }
  return null;
}

/* ================= AI-MATANALYSE (din egen API-nøkkel, direkte fra nettleseren) ================= */
const MATPROMPT = 'Du er en presis ernæringsekspert. Estimer næringsinnholdet i det som beskrives, med norske porsjonsstørrelser. ' +
  'Svar KUN med gyldig JSON, ingen annen tekst, ingen markdown. Format: ' +
  '{"items":[{"navn":"kort navn med mengde","kcal":0,"protein":0,"karbo":0,"fett":0}]} ' +
  'Alle tall som heltall. Del gjerne opp i flere items hvis maaltidet har flere komponenter.';

async function aiAnalyserMat(tekst, bilde){
  if(!S.apiKey){ throw new Error("NOKKEL_MANGLER"); }
  const content = [];
  if(bilde) content.push({ type:"image", source:{ type:"base64", media_type: bilde.mediaType, data: bilde.data } });
  content.push({ type:"text", text: MATPROMPT + (bilde
      ? " Identifiser maten på bildet og anslå porsjonsstørrelsene." + (tekst ? " Tilleggsinfo: " + tekst : "")
      : " Måltid: " + tekst) });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": S.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 1000, messages: [{ role:"user", content }] }),
  });
  if(!res.ok){
    let detail = "";
    try{ const j = await res.json(); detail = (j.error && j.error.message) || ""; }catch(e){}
    if(res.status === 401) throw new Error("NOKKEL_UGYLDIG");
    throw new Error("API_FEIL: " + (detail || res.status));
  }
  const data = await res.json();
  const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = txt.replace(/```json|```/g,"").trim();
  const a = clean.indexOf("{"), b = clean.lastIndexOf("}");
  const parsed = JSON.parse(clean.slice(a, b+1));
  if(!parsed.items || !Array.isArray(parsed.items)) throw new Error("UVENTET_SVAR");
  return parsed.items.map(it => ({
    navn: String(it.navn || "Mat"),
    kcal: Math.max(0, Math.round(Number(it.kcal)||0)),
    p: Math.max(0, Math.round(Number(it.protein)||0)),
    k: Math.max(0, Math.round(Number(it.karbo)||0)),
    f: Math.max(0, Math.round(Number(it.fett)||0)),
  }));
}

function ring(verdi, mal, label, farge){
  farge = farge || "var(--ember)";

  const over = verdi > mal*1.05;
  const R=34, CIRC=2*Math.PI*R;
  const strokeCol = over ? "var(--warn)" : pct>=0.95 ? "var(--moss)" : farge;
  return '<div class="ring-wrap"><div style="position:relative;width:88px;height:88px;">'
    + '<svg width="88" height="88" style="transform:rotate(-90deg)">'
    + '<circle cx="44" cy="44" r="'+R+'" fill="none" stroke="var(--line)" stroke-width="8"/>'
    + '<circle cx="44" cy="44" r="'+R+'" fill="none" stroke="'+strokeCol+'" stroke-width="8" stroke-linecap="round" '
    + 'stroke-dasharray="'+CIRC+'" stroke-dashoffset="'+(CIRC*(1-pct))+'"/></svg>'
    + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">'
    + '<div class="ring-num tabnum">'+Math.round(verdi)+'</div><div class="ring-lbl">/ '+mal+'</div></div></div>'
    + '<div class="eyebrow">'+label+'</div></div>';
}
function macroBar(verdi, mal, label, farge){
  farge = farge || "var(--ink2)";
  const pct = Math.min(100, mal>0 ? (verdi/mal)*100 : 0);
  const over = verdi > mal*1.1;
  return '<div><div class="between" style="margin-bottom:4px;"><span style="font-size:12px;font-weight:600;">'+label+'</span>'
    + '<span class="small mist tabnum">'+Math.round(verdi)+' / '+mal+' g</span></div>'
    + '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(over?"var(--warn)":farge)+';"></div></div></div>';
}
function ukeLinje(uke){
  let bars = "";

  return '<div class="uke-line">'+bars+'</div><div class="row" style="margin-top:6px;">'+lbls+'</div>';
}
function segControl(id, valg, opts){ // opts: [[value,label],...]
  return '<div class="seg" data-seg="'+id+'">' + opts.map(([v,l]) =>
    '<button type="button" class="'+(valg===v?"active":"")+'" data-val="'+v+'">'+l+'</button>').join("") + '</div>';
}
function svgLine(points, opts){
  opts = opts || {};
  const W = opts.w||300, H = opts.h||170, PAD=8, PADB=18, PADL=30;
  if(points.length < 2) return null;
  const ys = points.map(p=>p.y);
  let lo = Math.min(...ys), hi = Math.max(...ys);
  const pad = (hi-lo)*0.15 || hi*0.1 || 1;
  lo -= pad; hi += pad;
  const n = points.length;
  const x = i => PADL + (i/(n-1)) * (W-PADL-PAD);
  const y = v => opts.reversed
      ? PAD + ((v-lo)/(hi-lo)) * (H-PAD-PADB)
      : (H-PADB) - ((v-lo)/(hi-lo)) * (H-PAD-PADB);
  const pts = points.map((p,i)=>x(i)+","+y(p.y)).join(" ");
  const dots = points.map((p,i)=>'<circle cx="'+x(i)+'" cy="'+y(p.y)+'" r="3" fill="'+(opts.color||"#E8622C")+'"/>').join("");
  const fmtY = opts.fmtY || (v=>Math.round(v));
  const labels = points.map((p,i)=> (n<=6 || i===0 || i===n-1 || i===Math.floor(n/2)) ?
      '<text x="'+x(i)+'" y="'+(H-4)+'" font-size="9" fill="#7C949B" text-anchor="middle">'+esc(p.lbl)+'</text>' : "").join("");
  const gridY1 = '<line x1="'+PADL+'" y1="'+y(hi<lo?lo:hi)+'" x2="'+W+'" y2="'+y(hi<lo?lo:hi)+'" stroke="#DFE8E9" stroke-dasharray="3 3"/>';
  const sisteLbl = '<text x="'+x(n-1)+'" y="'+(y(points[n-1].y)-8)+'" font-size="10" font-weight="700" text-anchor="end" fill="'+(opts.color||"#E8622C")+'">'+fmtY(points[n-1].y)+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none" style="overflow:visible">'
    + '<polyline points="'+pts+'" fill="none" stroke="'+(opts.color||"#E8622C")+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + labels + sisteLbl + '</svg>';
}
function svgBar(points, opts){
  opts = opts || {};
  const W = opts.w||300, H = opts.h||170, PADB=18, PADT=8;
  const n = points.length; if(!n) return null;
  const maxV = Math.max(...points.map(p=>p.y), 1) * 1.15;
  const bw = (W / n) * 0.55;
  const gap = (W / n);
  const bars = points.map((p,i)=>{
    const bh = (p.y/maxV) * (H-PADT-PADB);
    const bx = i*gap + (gap-bw)/2;
    const by = H-PADB-bh;
    return '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="4" fill="'+(opts.color||"#16404D")+'"/>'
      + '<text x="'+(bx+bw/2)+'" y="'+(H-4)+'" font-size="9" fill="#7C949B" text-anchor="middle">'+esc(p.lbl)+'</text>';
  }).join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none">'+bars+'</svg>';
}

  plan.ov.forEach((o, oi) => {

    const sets = [];
    Array.from(container.children).forEach(row => {
      if(o.tid){
        const r = Number(row.querySelector('[data-f="r"]').value)||0;
        if(r>0) sets.push({ w:0, r });
      } else {
        const w = Number(String(row.querySelector('[data-f="w"]').value||"").replace(",","."))||0;
        const r = Number(row.querySelector('[data-f="r"]').value)||0;
        if(w>0 || r>0) sets.push({ w, r });

    });
    if(sets.length) ovelser.push({ n:o.n, sets });
  });
  if(!ovelser.length){ toast("Fyll inn minst ett sett før du lagrer"); return; }
  S.styrkelogg.push({ id:Date.now(), date: todayStr(), uke: beregnUke(S.profil.startDate), okt, ovelser });

  const km = Number(String((document.getElementById("lopKm")||{}).value||"").replace(",","."))||0;
  const min = Number((document.getElementById("lopMin")||{}).value)||0;
  const sek = Number((document.getElementById("lopSek")||{}).value)||0;
  const tot = min*60+sek;
  const pace = km>0 && tot>0 ? tot/km : 0;
  const out = document.getElementById("lopPaceOut");
  const btn = document.getElementById("lopSaveBtn");
  if(!out || !btn) return;
  if(pace>0){ out.innerHTML = paceFmt(pace)+' <span style="font-size:12px;font-weight:600;">/km</span>'; out.style.color="var(--ink)"; btn.disabled=false; }

function renderGrafer(){
  const alleOvelser = [].concat(STYRKE.A.ov, STYRKE.B.ov, STYRKE.C.ov).filter(o=>!o.tid && o.inc>0).map(o=>o.n);
  if(!UI.ovelseGraf || alleOvelser.indexOf(UI.ovelseGraf)===-1) UI.ovelseGraf = alleOvelser[0];

  let html = '<div class="card"><div class="eyebrow">Styrke · estimert 1RM (beste sett)</div>';
  html += '<select class="input" id="ovelseSelect" style="margin-top:8px;">' + alleOvelser.map(n=>
     '<option value="'+esc(n)+'"'+(n===UI.ovelseGraf?" selected":"")+'>'+esc(n)+'</option>').join("") + '</select>';

  const rader = [];
  S.styrkelogg.forEach(l=>{
    const o = (l.ovelser||[]).find(x=>x.n===UI.ovelseGraf);
    if(!o) return;
    const best = Math.max.apply(null, o.sets.map(s=>e1rm(s.w,s.r)));
    if(isFinite(best) && best>0) rader.push({ lbl: kortDato(l.date), y: Math.round(best*10)/10 });
  });
  html += '<div class="chartwrap">' + (rader.length>=2
     ? svgLine(rader, {color:"#E8622C", fmtY:function(v){return v+" kg";}})
     : emptyChart("Logg minst to økter med denne øvelsen, så tegnes grafen her.")) + '</div></div>';

  html += '<div class="card"><div class="between"><div class="eyebrow">Løping</div>'
   + segControl("lopVisning", UI.lopVisning, [["tempo","Tempo"],["volum","Km/uke"]]) + '</div>';
  if(UI.lopVisning==="tempo"){
    const td = S.lopelogg.filter(l=>l.pace>0).map(l=>({ lbl:kortDato(l.date), y:Math.round(l.pace) }));
    html += '<div class="chartwrap">' + (td.length>=2 ? svgLine(td, {color:"#16404D", reversed:true, fmtY:paceFmt}) : emptyChart("Logg minst to løpeøkter, så ser du tempoutviklingen her (lavere = raskere).")) + '</div>';
  } else {
    const per = {};
    S.lopelogg.forEach(l=>{ per[l.uke] = (per[l.uke]||0) + (l.km||0); });
    const vd = Object.keys(per).sort(function(a,b){return a-b;}).map(function(u){ return { lbl:"u"+u, y: Math.round(per[u]*10)/10 }; });
    html += '<div class="chartwrap">' + (vd.length>=1 ? svgBar(vd, {color:"#16404D"}) : emptyChart("Ukesvolumet dukker opp her når du logger løpeøkter.")) + '</div>';
  }
  html += '</div>';
  return html;
}

/* ================= MAT ================= */
function matFeilmelding(e){
  const msg = (e && e.message) || "";
  if(msg==="NOKKEL_MANGLER") return "Legg inn din Anthropic API-nøkkel under innstillinger først.";
  if(msg==="NOKKEL_UGYLDIG") return "API-nøkkelen ble avvist – sjekk at den er riktig under innstillinger.";
  if(e instanceof TypeError || msg.indexOf("fetch")>=0) return "Ingen kontakt med Anthropic – sjekk nettforbindelsen.";
  return "Fikk ikke analysert – prøv igjen, eller legg inn manuelt.";
}
function leggTilMatItems(items, kilde){
  const dato = UI.matDato;
  const dagData = S.mat[dato] || { type: standardDagtype(dato), items: [] };
  const nye = items.map(function(it){ return Object.assign({}, it, { id: Date.now()+Math.random(), kilde: kilde }); });
  dagData.items = dagData.items.concat(nye);
  S.mat[dato] = dagData;
  persist();
}
function actMatPrevDay(){ const d=parseDstr(UI.matDato); d.setDate(d.getDate()-1); UI.matDato=dstr(d); UI.matTekstVal=""; UI.matFeil=""; renderTab(); }
function actMatNextDay(){ const d=parseDstr(UI.matDato); d.setDate(d.getDate()+1); const ny=dstr(d); if(ny>todayStr()) return; UI.matDato=ny; UI.matTekstVal=""; UI.matFeil=""; renderTab(); }
function actMatType(t){
  const dato = UI.matDato;
  const dagData = S.mat[dato] || { type: standardDagtype(dato), items: [] };
  dagData.type = t; S.mat[dato] = dagData; persist(); renderTab();
}
function actMatManuellToggle(){ UI.manuellMat = !UI.manuellMat; renderTab(); }
function actMatManuellSave(){
  const navn = document.getElementById("mNavn").value.trim();
  const kcalRaw = document.getElementById("mKcal").value;
  if(!navn || kcalRaw==="") { toast("Fyll inn minst navn og kalorier"); return; }
  const kcal = Number(String(kcalRaw).replace(",","."))||0;
  const p = Number(String(document.getElementById("mP").value||"").replace(",","."))||0;
  const k = Number(String(document.getElementById("mK").value||"").replace(",","."))||0;
  const f = Number(String(document.getElementById("mF").value||"").replace(",","."))||0;
  leggTilMatItems([{ navn:navn, kcal:kcal, p:p, k:k, f:f }], "manuell");
  UI.manuellMat = false;
  renderTab();
  toast("Lagt til");
}
function actMatDeleteItem(id){
  const dato = UI.matDato; const dagData = S.mat[dato];
  if(!dagData) return;
  dagData.items = dagData.items.filter(function(i){ return String(i.id)!==String(id); });
  S.mat[dato] = dagData; persist(); renderTab();
}
async function actMatAnalyserTekst(){
  const inp = document.getElementById("matTekstInput");
  const tekst = inp.value.trim();
  if(!tekst) return;
  UI.matTekstVal = tekst;
  if(!S.apiKey){ UI.matFeil = "Legg inn din Anthropic API-nøkkel under innstillinger først."; renderTab(); return; }
  UI.matJobber = true; UI.matFeil = ""; renderTab();
  try{
    const items = await aiAnalyserMat(tekst, null);
    leggTilMatItems(items, "ai");
    UI.matTekstVal = "";
  }catch(e){ UI.matFeil = matFeilmelding(e); }
  UI.matJobber = false;
  renderTab();
}
function actMatPhotoPick(){ if(!UI.matJobber) document.getElementById("matFileInput").click(); }
function actMatPhotoChange(file){
  if(!file) return;
  if(!S.apiKey){ UI.matFeil = "Legg inn din Anthropic API-nøkkel under innstillinger først."; renderTab(); return; }
  const tekst = (document.getElementById("matTekstInput")||{}).value || "";
  UI.matJobber = true; UI.matFeil = ""; renderTab();
  const reader = new FileReader();
  reader.onload = async function(){
    try{
      const m = String(reader.result).match(/^data:(.+?);base64,(.*)$/);
      if(!m) throw new Error("BILDE_FEIL");
      const items = await aiAnalyserMat(tekst, { mediaType: m[1], data: m[2] });
      leggTilMatItems(items, "foto");
      UI.matTekstVal = "";
    }catch(e){ UI.matFeil = matFeilmelding(e); }
    UI.matJobber = false;
    renderTab();
  };
  reader.onerror = function(){ UI.matFeil = "Kunne ikke lese bildet."; UI.matJobber=false; renderTab(); };
  reader.readAsDataURL(file);
}
function renderMat(){
  const dato = UI.matDato;
  const dagData = S.mat[dato] || { type: standardDagtype(dato), items: [] };
  const mal = MATMAL[dagData.type];
  const tot = summerMat(dagData);
  const erIdag = dato === todayStr();

  let html = '<div class="between" style="margin-bottom:12px;">'
    + '<button class="icon-btn" data-act="mat-prev" style="background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px;">'+ic("chevL",18)+'</button>'
    + '<div style="font-weight:900;font-size:15px;">'+(erIdag?"I dag":kortDato(dato))+'</div>'
    + '<button class="icon-btn" data-act="mat-next" style="background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px;'+(erIdag?"opacity:.35;":"")+'" '+(erIdag?"disabled":"")+'>'+ic("chevR",18)+'</button>'
    + '</div>';

  html += '<div class="card"><div class="between" style="margin-bottom:12px;">'
    + '<div class="eyebrow">Dagsmål</div>' + segControl("matType", dagData.type, [["trening","Treningsdag"],["hvile","Hviledag"]])
    + '</div>'
    + '<div style="display:flex;justify-content:space-around;margin-bottom:14px;">'
    + ring(tot.kcal, mal.kcal, "Kalorier") + ring(tot.p, mal.p, "Protein", "var(--ink2)")
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;">'
    + macroBar(tot.k, mal.k, "Karbohydrat") + macroBar(tot.f, mal.f, "Fett", "var(--mist)")
    + '</div></div>';

  html += '<div class="card"><div class="eyebrow">Legg til mat</div>'
    + '<div style="margin-top:8px;"><input class="input" id="matTekstInput" placeholder="F.eks. 150 g kylling, 80 g ris og brokkoli" value="'+esc(UI.matTekstVal||"")+'"></div>'
    + '<div class="btn-row" style="margin-top:10px;">'
    + '<button class="btn primary" style="flex:1;" data-act="mat-analyser" '+(UI.matJobber?"disabled":"")+'>'+ic("sparkles",16)+' '+(UI.matJobber?"Analyserer …":"Analyser med AI")+'</button>'
    + '<button class="btn dark" style="width:52px;flex:none;" data-act="mat-photo" '+(UI.matJobber?"disabled":"")+'>'+ic("camera",18)+'</button>'
    + '</div>'
    + '<input type="file" accept="image/*" capture="environment" id="matFileInput" style="display:none;">'
    + (UI.matFeil ? '<div class="small" style="margin-top:8px;color:var(--warn);font-weight:600;">'+esc(UI.matFeil)+'</div>' : "")
    + '<button class="linkbtn mist" style="margin-top:10px;" data-act="mat-manuell-toggle">'+(UI.manuellMat?"– Skjul manuell registrering":"+ Legg inn manuelt i stedet")+'</button>';
  if(UI.manuellMat){
    html += '<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">'
     + '<input class="input" id="mNavn" placeholder="Navn (f.eks. Grovbrød m/ost, 2 skiver)">'
     + '<div class="grid4">'
     + '<input class="input" type="text" inputmode="numeric" placeholder="kcal" id="mKcal">'
     + '<input class="input" type="text" inputmode="numeric" placeholder="P g" id="mP">'
     + '<input class="input" type="text" inputmode="numeric" placeholder="K g" id="mK">'
     + '<input class="input" type="text" inputmode="numeric" placeholder="F g" id="mF">'
     + '</div>'
     + '<button class="btn dark small" data-act="mat-manuell-save">Legg til</button>'
     + '</div>';
  }
  html += '</div>';

  html += '<div class="card"><div class="eyebrow">Logget '+(erIdag?"i dag":kortDato(dato))+'</div>';
  if(!dagData.items.length){
    html += '<div class="small mist" style="margin-top:10px;line-height:1.5;">Ingenting logget ennå. Skriv hva du spiste eller ta et bilde av tallerkenen – AI-en anslår næringen for deg.</div>';
  } else {
    html += '<div style="margin-top:8px;">' + dagData.items.map(function(it){
      return '<div class="food-item"><div style="flex:1;min-width:0;">'
        + '<div style="font-weight:700;font-size:13.5px;">'+esc(it.navn)+'</div>'
        + '<div class="small mist tabnum">'+it.kcal+' kcal · P '+it.p+' · K '+it.k+' · F '+it.f+((it.kilde==="ai"||it.kilde==="foto")?' · AI-estimat':'')+'</div>'
        + '</div><button class="icon-btn" data-act="mat-delete" data-id="'+it.id+'">'+ic("trash",16)+'</button></div>';
    }).join("") + '</div>';
  }
  html += '</div>';
  return html;
}

/* ================= MÅL ================= */
function renderMaal(){
  const vekt = S.kropp.vekt, midje = S.kropp.midje;
  const grense = new Date(); grense.setDate(grense.getDate()-7);
  const siste7 = vekt.filter(function(v){ return parseDstr(v.date) >= grense; });
  const snitt7 = siste7.length ? siste7.reduce(function(a,v){return a+v.kg;},0)/siste7.length : null;
  const vektData = vekt.map(function(v){ return { lbl: kortDato(v.date), y: v.kg }; });

  let html = '<div class="card"><div class="between" style="align-items:baseline;">'
   + '<div class="eyebrow">Kroppsvekt · mål 80–82 kg</div>'
   + (snitt7 ? '<span class="small mist tabnum">Snitt 7 d: <b style="color:var(--ink);">'+snitt7.toFixed(1)+' kg</b></span>' : '')
   + '</div>'
   + '<div class="row" style="margin-top:10px;">'
   + '<input class="input" type="text" inputmode="decimal" placeholder="Dagens vekt (kg)" id="vektInput">'
   + '<button class="btn primary small" data-act="maal-add-vekt">'+ic("plus",16)+'</button>'
   + '</div>'
   + '<div class="chartwrap">' + (vektData.length>=2 ? svgLine(vektData, {color:"#E8622C", fmtY:function(v){return v.toFixed(1)+" kg";}}) : emptyChart("Vei deg 3 morgener i uken og logg her.")) + '</div>'
   + '</div>';

  html += '<div class="card"><div class="eyebrow">Midjemål (ved navlen) · hver 4. uke</div>'
   + '<div class="row" style="margin-top:10px;">'
   + '<input class="input" type="text" inputmode="decimal" placeholder="cm" id="midjeInput">'
   + '<button class="btn primary small" data-act="maal-add-midje">'+ic("plus",16)+'</button>'
   + '</div>';
  if(midje.length){
    html += '<div class="row" style="margin-top:10px;flex-wrap:wrap;gap:14px;">' + midje.slice(-5).map(function(m){
      return '<div class="small tabnum"><span class="mist" style="font-size:11px;">'+kortDato(m.date)+'</span> <b>'+m.cm+' cm</b></div>';
    }).join("") + '</div>';
  }
  html += '</div>';

  const tester = S.lopelogg.filter(function(l){return l.type==="test";}).sort(function(a,b){return a.date<b.date?-1:1;});
  html += '<div class="card"><div class="eyebrow">10 km-tester · start 47:00, mål 44:00–45:00</div>'
   + '<div class="grid3" style="margin-top:10px;">'
   + '<input class="input" type="text" inputmode="numeric" placeholder="min" id="testMin">'
   + '<input class="input" type="text" inputmode="numeric" placeholder="sek" id="testSek">'
   + '<button class="btn primary small" data-act="maal-add-test">'+ic("plus",16)+'</button>'
   + '</div>';
  if(!tester.length){
    html += '<div class="small mist" style="margin-top:10px;">Registrer testløpene fra uke 12 og 24 her.</div>';
  } else {
    html += '<div style="margin-top:10px;">' + tester.map(function(t){
      const diff = 2820 - t.sekTotal;
      return '<div class="between" style="padding:8px 0;border-bottom:1px solid var(--line);">'
       + '<span class="small mist">'+kortDato(t.date)+' · uke '+t.uke+'</span>'
       + '<span style="font-weight:800;" class="tabnum">'+tidFmt(t.sekTotal)
       + ' <span style="font-size:12px;margin-left:8px;color:'+(diff>=0?"var(--moss)":"var(--warn)")+';">'+(diff>=0?"−":"+")+tidFmt(Math.abs(diff))+' vs start</span></span></div>';
    }).join("") + '</div>';
  }
  html += '</div>';

  html += '<div class="card"><div class="eyebrow">Milepæler</div><div style="margin-top:8px;">'
   + MILEPAELER.map(function(m){
     const on = !!(S.profil.mp && S.profil.mp[m.uke]);
     return '<div class="milerow" data-act="maal-toggle-mp" data-val="'+m.uke+'">'
      + '<div class="mchk'+(on?" on":"")+'">'+(on?ic("check",14):"")+'</div>'
      + '<div><div class="small" style="font-weight:800;color:var(--mist);letter-spacing:.08em;">UKE '+m.uke+'</div>'
      + '<div style="font-size:13.5px;font-weight:600;line-height:1.4;'+(on?"color:var(--mist);text-decoration:line-through;":"")+'">'+esc(m.t)+'</div></div></div>';
   }).join("") + '</div></div>';
  return html;
}
function actMaalAddVekt(){
  const raw = document.getElementById("vektInput").value.replace(",", ".");
  const kg = Number(raw);
  if(!(kg>30 && kg<250)){ toast("Sjekk tallet du skrev inn"); return; }
  S.kropp.vekt = S.kropp.vekt.filter(function(v){return v.date!==todayStr();}).concat([{date:todayStr(), kg:kg}]).sort(function(a,b){return a.date<b.date?-1:1;});
  persist(); renderTab(); toast("Vekt lagret");
}
function actMaalAddMidje(){
  const raw = document.getElementById("midjeInput").value.replace(",", ".");
  const cm = Number(raw);
  if(!(cm>40 && cm<200)){ toast("Sjekk tallet du skrev inn"); return; }
  S.kropp.midje = S.kropp.midje.filter(function(v){return v.date!==todayStr();}).concat([{date:todayStr(), cm:cm}]).sort(function(a,b){return a.date<b.date?-1:1;});
  persist(); renderTab(); toast("Midjemål lagret");
}
function actMaalAddTest(){
  const min = Number(document.getElementById("testMin").value)||0;
  const sek = Number(document.getElementById("testSek").value)||0;
  const tot = min*60+sek;
  if(!(tot>1200 && tot<7200)){ toast("Sjekk tiden du skrev inn"); return; }
  const uke = beregnUke(S.profil.startDate);
  S.lopelogg.push({ id:Date.now(), date: todayStr(), uke: uke, slot:"test", type:"test", km:10, sekTotal:tot, pace:tot/10, notat:"10 km-test" });
  persist(); renderTab(); toast("Testløp lagret 🏁");
}
function actMaalToggleMp(uke){
  S.profil.mp = S.profil.mp || {};
  S.profil.mp[uke] = !S.profil.mp[uke];
  persist(); renderTab();
}

/* ================= INNSTILLINGER (modal) ================= */
function renderInnstillinger(){
  return '<div class="modal-bg" data-act="close-settings-bg">'
   + '<div class="modal-card" data-act="noop">'
   + '<div class="between" style="margin-bottom:14px;"><div style="font-weight:900;font-size:18px;">Innstillinger</div>'
   + '<button class="icon-btn" data-act="close-settings">'+ic("x",22)+'</button></div>'

   + '<div class="card"><div class="row" style="margin-bottom:2px;">'+ic("key",16)+'<div class="eyebrow">Anthropic API-nøkkel</div></div>'
   + '<div class="small mist" style="margin:6px 0 10px;line-height:1.5;">Brukes kun til AI-bildeskanning av mat. Lagres kun lokalt på denne telefonen. '
   + 'Hent din nøkkel på <b>platform.claude.com</b> (Account Settings → API Keys). Du betaler for bruken selv – med Haiku-modellen koster hver matanalyse typisk under 1 øre.</div>'
   + '<input class="input" type="password" id="apiKeyInput" placeholder="sk-ant-…" value="'+esc(S.apiKey||"")+'">'
   + '<button class="btn dark small" style="margin-top:10px;" data-act="settings-save-key">Lagre nøkkel</button>'
   + '</div>'

   + '<div class="card"><div class="eyebrow">Startdato (uke 1)</div>'
   + '<div class="row" style="margin-top:8px;">'
   + '<input class="input" type="date" id="startDatoInput" value="'+S.profil.startDate+'">'
   + '<button class="btn small" data-act="settings-save-date">Lagre</button>'
   + '</div></div>'

   + '<div class="card"><div class="eyebrow warn">Faresone</div>'
   + '<div class="small mist" style="margin:6px 0 10px;">Sletter all loggført trening, mat og målinger permanent fra denne telefonen.</div>'
   + (UI.resetConfirm
     ? '<div class="btn-row"><button class="btn soft small" data-act="settings-reset-yes">Ja, slett alt</button><button class="btn ghost small" data-act="settings-reset-cancel">Avbryt</button></div>'
     : '<button class="btn ghost small" data-act="settings-reset-show">Nullstill alle data…</button>')
   + '</div>'
   + '</div></div>';
}
function actOpenSettings(){ UI.resetConfirm=false; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actCloseSettings(){ document.getElementById("modalRoot").innerHTML = ""; }
function actSettingsSaveKey(){
  const v = document.getElementById("apiKeyInput").value.trim();
  S.apiKey = v; persist();
  actCloseSettings(); renderTab(); toast(v ? "API-nøkkel lagret" : "API-nøkkel fjernet");
}
function actSettingsSaveDate(){
  const v = document.getElementById("startDatoInput").value;
  if(!v) return;
  S.profil.startDate = v; persist();
  actCloseSettings(); renderTab(); toast("Startdato oppdatert");
}
function actSettingsResetShow(){ UI.resetConfirm=true; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actSettingsResetCancel(){ UI.resetConfirm=false; document.getElementById("modalRoot").innerHTML = renderInnstillinger(); }
function actSettingsResetYes(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  S = defaultState();
  UI = { tab:"hjem", treningView:"logg", aktivOkt:null, aktivLop:null, matDato: todayStr(), manuellMat:false, lopVisning:"tempo", ovelseGraf:null, settingsOpen:false, matFeil:"", matJobber:false, resetConfirm:false };
  actCloseSettings();
  boot();
}

/* ================= SENTRAL DISPATCH + OPPSTART ================= */
document.addEventListener("click", function(e){
  const segBtn = e.target.closest(".seg button");
  if(segBtn){
    const wrap = segBtn.closest("[data-seg]");
    const segName = wrap.getAttribute("data-seg");
    const val = segBtn.getAttribute("data-val");
    if(segName==="matType"){ actMatType(val); return; }
    if(segName==="treningView"){ UI.treningView = val; }
    else if(segName==="lopVisning"){ UI.lopVisning = val; }
    renderTab();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act = el.getAttribute("data-act");
  const val = el.getAttribute("data-val");
  if(act==="nav") setTab(val);
  else if(act==="open-settings") actOpenSettings();
  else if(act==="close-settings") actCloseSettings();
  else if(act==="close-settings-bg") actCloseSettings();
  else if(act==="onboarding-start") actOnboardingStart();
  else if(act==="open-okt") actOpenOkt(val);
  else if(act==="open-lop") actOpenLop(val);
  else if(act==="back-trening") actBackTrening();
  else if(act==="styrke-addset") actStyrkeAddSet(el.getAttribute("data-okt"), Number(el.getAttribute("data-idx")));
  else if(act==="styrke-save") actStyrkeSave(el.getAttribute("data-okt"));
  else if(act==="lop-save") actLopSave(el.getAttribute("data-slot"));
  else if(act==="mat-prev") actMatPrevDay();
  else if(act==="mat-next") actMatNextDay();
  else if(act==="mat-analyser") actMatAnalyserTekst();
  else if(act==="mat-photo") actMatPhotoPick();
  else if(act==="mat-manuell-toggle") actMatManuellToggle();
  else if(act==="mat-manuell-save") actMatManuellSave();
  else if(act==="mat-delete") actMatDeleteItem(el.getAttribute("data-id"));
  else if(act==="maal-add-vekt") actMaalAddVekt();
  else if(act==="maal-add-midje") actMaalAddMidje();
  else if(act==="maal-add-test") actMaalAddTest();
  else if(act==="maal-toggle-mp") actMaalToggleMp(Number(val));
  else if(act==="settings-save-key") actSettingsSaveKey();
  else if(act==="settings-save-date") actSettingsSaveDate();
  else if(act==="settings-reset-show") actSettingsResetShow();
  else if(act==="settings-reset-cancel") actSettingsResetCancel();
  else if(act==="settings-reset-yes") actSettingsResetYes();
});
document.addEventListener("input", function(e){
  if(e.target && (e.target.id==="lopKm" || e.target.id==="lopMin" || e.target.id==="lopSek")) oppdaterLopPace();
});
document.addEventListener("change", function(e){
  if(!e.target) return;
  if(e.target.id==="matFileInput"){ const f=e.target.files && e.target.files[0]; actMatPhotoChange(f); e.target.value=""; }
  else if(e.target.id==="ovelseSelect"){ UI.ovelseGraf = e.target.value; renderTab(); }
});

function boot(){
  const app = document.getElementById("app");
  if(!S.profil){ app.innerHTML = renderOnboarding(); return; }
  app.innerHTML = renderShell();
  renderTab();
}
boot();
</script>
